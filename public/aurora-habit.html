<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:transparent;
font-family:'Quicksand',sans-serif;
color:#7f87ff;
overflow:hidden;
}

/* container */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

text-align:left;

display:grid;
grid-template-columns:1fr;

gap:8px;

font-size:18px;
}

/* title */

.title{
position:absolute;
top:-60px;
left:50%;
transform:translateX(-50%);
font-size:20px;
letter-spacing:2px;
opacity:.9;

white-space:nowrap;

text-shadow:
0 0 8px #7f87ff,
0 0 16px #00a9ba;
}

/* section headers */

.section{
margin-top:12px;
font-size:14px;
letter-spacing:2px;
opacity:.6;
}

/* habits */

.habit{
transition:.35s;
opacity:.85;
}

/* completed */

.done{
color:#7fffd4;

text-shadow:
0 0 10px #00ffd0,
0 0 20px #00a9ba;

opacity:1;
}

/* glow animation */

.doneGlow{
animation:auroraPulse 3s ease-in-out infinite;
}

@keyframes auroraPulse{

0%{
text-shadow:
0 0 10px #00ffd0,
0 0 18px rgba(0,169,186,.6);
}

50%{
text-shadow:
0 0 12px #7fffd4,
0 0 26px rgba(0,169,186,.8);
}

100%{
text-shadow:
0 0 10px #00ffd0,
0 0 18px rgba(0,169,186,.6);
}

}

/* energy */

.energy{
margin-bottom:10px;
font-size:16px;
letter-spacing:1px;
opacity:.85;
}

/* progress panel */

.progress{
margin-top:14px;
font-size:13px;
letter-spacing:1px;
opacity:.9;
}

/* label */

.progress-label{
margin-bottom:4px;
}

/* bar */

.progress-bar{
width:180px;
height:8px;

background:rgba(255,255,255,.08);
border-radius:10px;
overflow:hidden;

box-shadow:
inset 0 0 6px rgba(0,0,0,.5);
}

/* fill */

.progress-fill{
height:100%;
width:0%;

background:linear-gradient(90deg,#7f87ff,#00ffd0);

box-shadow:
0 0 10px rgba(0,255,200,.6);

transition:width .6s ease;
}

/* sparkle effect */

.sparkle{
position:absolute;
pointer-events:none;
font-size:10px;
opacity:0;
animation:sparkleBurst .9s ease-out forwards;
}

@keyframes sparkleBurst{

0%{
opacity:1;
transform:translate(0,0) scale(.6);
}

100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(1.2);
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">✨ Stardust Tasks</div>

<div class="energy" id="energy">SPOON ENERGY ●●●○○</div>

<div class="section">MORNING</div>

<div class="habit" id="walk">☐ Walk Koda</div>
<div class="habit" id="yoga">☐ Zen Yoga</div>
<div class="habit" id="bird">☐ Bird Log</div>

<div class="section">AFTERNOON</div>

<div class="habit" id="chores">☐ Chores</div>
<div class="habit" id="nature">☐ Nature Project</div>
<div class="habit" id="park">☐ Park Patrol</div>
<div class="habit" id="basin">☐ Basin Patrol</div>
<div class="habit" id="pipe">☐ Warp Pipe Patrol</div>

<div class="section">EVENING</div>

<div class="habit" id="tarot">☐ Tarot Reading</div>
<div class="habit" id="write">☐ Creative Writing</div>
<div class="habit" id="stitch">☐ Knits + Stitches</div>
<div class="habit" id="brain">☐ Brain Games</div>
<div class="habit" id="strength">☐ Strength Training</div>

<div class="progress">

<div class="progress-label" id="progressText">DAY PROGRESS</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

</div>

</div>

<script>

async function updateHabits(){

try{

let res = await fetch("aurora-habits.json?nocache="+Date.now());
let data = await res.json();

/* energy */

let spoons = "●".repeat(data.energy) + "○".repeat(5-data.energy);
document.getElementById("energy").innerText = "SPOON ENERGY "+spoons;

/* tasks */

let total=0;
let done=0;

for(let key in data){

if(key==="energy") continue;

let el=document.getElementById(key);
if(!el) continue;

total++;

if(data[key]){

done++;

if(!el.classList.contains("done")){

spawnSparkles(el);

let label=el.innerText.substring(2);

el.innerText="☑ "+label;

el.classList.add("done");
el.classList.add("doneGlow");

}

}else{

let label=el.innerText.substring(2);

el.innerText="☐ "+label;

el.classList.remove("done");
el.classList.remove("doneGlow");

}

}

/* progress */

let percent=Math.floor((done/total)*100);

document.getElementById("progressText").innerText =
"DAY PROGRESS "+percent+"%";

document.getElementById("progressFill").style.width =
percent+"%";

}catch(e){

console.log("habit load error");

}

}

function spawnSparkles(el){

const rect = el.getBoundingClientRect();

for(let i=0;i<6;i++){

let s = document.createElement("div");
s.className="sparkle";
s.innerText="✦";

let x = (Math.random()*60-30)+"px";
let y = (Math.random()*40-20)+"px";

s.style.setProperty("--x",x);
s.style.setProperty("--y",y);

s.style.left = rect.left + rect.width/2 + "px";
s.style.top = rect.top + rect.height/2 + "px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),900);

}
}

updateHabits();
setInterval(updateHabits,3000);

</script>

</body>
</html>
