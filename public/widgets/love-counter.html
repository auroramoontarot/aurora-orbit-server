<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:transparent;
  font-family:'Quicksand', sans-serif;
  overflow:hidden;
}

/* CONTAINER — MATCHES MAIN PANEL SYSTEM */
#loveCounter{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  padding:10px 14px;
  border-radius:14px;

  color:#cbecf5;

  /* GLASS BASE */
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);

  backdrop-filter: blur(18px) saturate(1.25);
  -webkit-backdrop-filter: blur(18px) saturate(1.25);

  box-shadow:
    0 8px 22px rgba(0,0,0,.18),
    0 0 10px rgba(127,135,255,.12);

  text-align:center;
  overflow:hidden;
  isolation:isolate;
}

/* GLASS SHINE (TOP LIGHT) */
#loveCounter::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,.22),
    rgba(255,255,255,.05) 35%,
    transparent 65%
  );
}

/* GLASS EDGE LIGHT */
#loveCounter::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,.14),
    rgba(255,255,255,.04),
    transparent
  );

  opacity:.45;
}

/* TWINKLE LAYER */
.twinkle{
  position:absolute;
  inset:0;
  pointer-events:none;

  background:
    radial-gradient(circle at 18% 28%, rgba(255,255,255,.8) 0 1px, transparent 2px),
    radial-gradient(circle at 82% 22%, rgba(255,255,255,.7) 0 1px, transparent 2px),
    radial-gradient(circle at 70% 70%, rgba(198,199,248,.6) 0 1px, transparent 2px),
    radial-gradient(circle at 28% 78%, rgba(203,236,245,.7) 0 1px, transparent 2px);

  opacity:.25;
  animation:twinkle 9s ease-in-out infinite;
  z-index:1;
}

@keyframes twinkle{
  0%,100%{opacity:.18}
  50%{opacity:.45}
}

/* TEXT ABOVE EFFECTS */
#loveCounter > *{
  position:relative;
  z-index:2;
}

/* TEXT STYLING */
.names{
  font-size:14px;
  letter-spacing:1.5px;
  opacity:.8;
  margin-bottom:6px;
}

.days{
  font-size:40px;
  font-weight:600;
  text-shadow:0 0 20px #00a9ba;
}

.label{
  font-size:14px;
  opacity:.75;
  margin-top:4px;
}

.since{
  margin-top:6px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div id="loveCounter">
  <div class="names">Aurora ✨ Jacob</div>

  <div class="days">
    <span id="days">0</span>
  </div>

  <div class="label">days together</div>

  <div class="since" id="sinceText"></div>
</div>

<script>
const anniversary = "2022-09-02";

function formatDate(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, {
    year:'numeric',
    month:'long',
    day:'numeric'
  });
}

function update(){
  const start = new Date(anniversary + "T00:00:00");
  const now = new Date();

  const diff = now - start;
  const days = Math.floor(diff / (1000*60*60*24));

  document.getElementById("days").textContent = days >= 0 ? days : 0;
  document.getElementById("sinceText").textContent = "since " + formatDate(anniversary);
}

update();
setInterval(update, 60*60*1000);
</script>

</body>
</html>
