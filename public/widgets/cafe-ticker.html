<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Aurora Mini Info Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --text:#cbecf5;
    --soft:#c6c7f8;
    --aurora:#00a9ba;
    --primary:#7f87ff;
    --line:rgba(203,236,245,0.14);
    --panel:rgba(12,16,30,0.88);
  }

  *{
    box-sizing:border-box;
  }

  html,
  body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:'Quicksand', sans-serif;
    color:var(--text);
  }

  body{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:12px;
  }

  .bar{
    width:100%;
    max-width:1800px;

    display:flex;
    align-items:center;
    gap:18px;

    padding:12px 18px;

    background:var(--panel);

    border:1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(14px);

    box-shadow:
      0 0 24px rgba(127,135,255,0.08),
      inset 0 0 30px rgba(0,0,0,0.25);

    overflow:hidden;
  }

  .section{
    display:flex;
    align-items:center;
    gap:6px;

    flex-shrink:0;
  }

  .divider{
    width:1px;
    height:28px;
    background:var(--line);
    flex-shrink:0;
  }

  .label{
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--soft);
  }

  .value{
  font-size:13px;
  font-weight:700;
  color:#fff;
  line-height:1;
}

.sub{
  font-size:10px;
  opacity:.75;
  line-height:1;
}

  .live-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ff6b8f;

    box-shadow:0 0 10px rgba(255,107,143,.8);

    animation:pulse 2s infinite;
  }

  @keyframes pulse{
    0%,100%{
      opacity:1;
      transform:scale(1);
    }

    50%{
      opacity:.5;
      transform:scale(.8);
    }
  }

  .ticker-wrap{
  flex:1;
  overflow:hidden;
  position:relative;
}

.ticker-track{
  display:flex;
  width:max-content;

  animation:scroll 90s linear infinite;
}

.ticker{
  white-space:nowrap;

  font-size:15px;
  font-weight:600;

  padding-right:80px;
}

  @keyframes scroll{
  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(-50%);
  }
}

</style>
</head>

<body>

<div class="bar">

  <div class="section">
    <div class="live-dot"></div>

    <div>
      <div class="label">Aurora Local</div>
      <div class="sub">Moonbeam Broadcast</div>
    </div>
  </div>
  <div class="section">
  <div class="live-dot"></div>
</div>

<div class="section">
  <div class="value" id="temp">63°</div>
</div>

<div class="section">
  <div class="sub" id="weatherDesc">
    Mostly Cloudy
  </div>
</div>

<div class="section">
  <div class="value" id="clock">--:--</div>
</div>

 <div class="divider"></div>

<div class="ticker-wrap">
  <div class="ticker-track">
    <div class="ticker" id="ticker"></div>
    <div class="ticker" id="ticker-clone"></div>
  </div>
</div>
  </div>

<script>
  function updateClock(){
    const now = new Date();

    document.getElementById("clock").textContent =
      now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
  }

  updateClock();
  setInterval(updateClock, 1000);

  const API_BASE = "http://localhost:3000";

async function buildMegaTicker() {

  let weatherText =
    "🌤 Aurora skies calm";

  let mediaText =
    "📚 Cozy media loading";

  let worldStats = [];

  /*
    WEATHER
  */

  try {

    const weather = await fetch(
      `${API_BASE}/weather`
    ).then(r => r.json());

    const obs =
      weather?.observations?.[0];

    const temp =
      obs?.imperial?.temp;

    const humidity =
      obs?.humidity;

    const desc =
      weather?.current?.description ||
      "Cozy skies";

    weatherText =
      `🌤 ${Math.round(temp)}° • ${humidity}% humidity • ${desc}`;

  } catch (err) {
    console.log("Weather failed");
  }

  /*
    MEDIA STATUS
  */

  try {

    const media = await fetch(
      `${API_BASE}/media-status`
    ).then(r => r.json());

    const reading =
      media?.book?.title
      ? `📚 Reading: ${media.book.title}`
      : null;

    const watching =
      media?.watching?.title
      ? `📺 Watching: ${media.watching.title}`
      : null;

    mediaText =
      [reading, watching]
      .filter(Boolean)
      .join(" • ");

  } catch (err) {
    console.log("Media failed");
  }

  /*
    AURORA WORLD STATS
  */

  try {

    const data = await fetch(
      `${API_BASE}/data/aurora-moon-data.json`
    ).then(r => r.json());

    worldStats = [

      `🎮 Pokémon ${data.pokemon_caught || 0}`,

      `🌀 Pokéstops ${data.pokestops_spun || 0}`,

      `🥚 Eggs ${data.eggs_hatched || 0}`,

      `🌿 Nature Projects ${data.nature_projects || 0}`,

      `🐦 Lifebirds ${data.lifebirds || 0}`,

      `🧹 Cleanups ${data.park_cleanups || 0}`,

      `🗑 Trash Bags ${data.trash_bags || 0}`,

      `🤝 Volunteer ${data.volunteer_hours || 0}h`,

      `🃏 Packs ${data.packs_opened || 0}`,

      `✨ Rare Cards ${data.rare_cards || 0}`,

      `💥 EX Cards ${data.ex_cards || 0}`

    ];

  } catch (err) {
    console.log("World stats failed");
  }

  /*
    EXTRA COZY FEEDS
  */

  const cozyExtras = [

    "☕ 11th House Coffee + Collab",

    "🌙 Moonbeams hydrate",

    "✨ Scatter stardust",

    "💻 Cozy co-working in progress",

    "🎴 Tarot energy feels strong",

    "🪐 Spoonie pacing encouraged",

    "☁️ Existing is enough today",

    "🌌 Soft skies over the creek"

  ];

  /*
    BUILD FINAL TICKER
  */

  const finalTicker = [

    weatherText,

    mediaText,

    ...worldStats,

    ...cozyExtras

  ];

const tickerText =
  finalTicker.join(" • ") + " • ";

document.getElementById("ticker").textContent =
  tickerText;

document.getElementById("ticker-clone").textContent =
  tickerText;
}

/*
  INITIAL LOAD
*/

buildMegaTicker();

/*
  REFRESH
*/

setInterval(buildMegaTicker, 60000);
</script>

</body>
</html>
