<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Field Transmission Phone</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Quicksand', sans-serif;
}

body{
  position:relative;
  pointer-events:none;
}

/* =========================
   WHOLE PHONE FRAME
========================= */

.phone-frame{
  position:absolute;
  top:0;
  left:0;
  width:512px;
  height:910px;
  background:transparent;
}

.phone-frame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
  z-index:5;
}

/* =========================
   SCREEN CONTENT AREA
========================= */

.phone-overlay{
  opacity:0.75;
  position:absolute;
  top:85px;
  left:115px;
  width:282px;
  height:690px;

  border-radius:32px;
  overflow:hidden;

  display:flex;
  flex-direction:column;
  justify-content:flex-end;

  background:
    linear-gradient(180deg, rgba(127,135,255,.30), rgba(0,169,186,.24)),
    radial-gradient(circle at top, rgba(127,135,255,.26), transparent 58%),
    radial-gradient(circle at bottom, rgba(0,169,186,.24), transparent 62%);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    inset 0 -24px 50px rgba(0,0,0,.08);

  isolation:isolate;
  z-index:1;

  animation:subtleZoom 12s ease-in-out infinite;
}

@keyframes subtleZoom{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.02); }
}

/* moving music glow */
.phone-overlay::before{
  content:"";
  position:absolute;
  inset:-12%;
  z-index:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(127,135,255,.26), transparent 34%),
    radial-gradient(circle at 70% 65%, rgba(0,169,186,.24), transparent 36%),
    radial-gradient(circle at 50% 100%, rgba(198,199,248,.18), transparent 42%);
  filter:blur(16px);
  opacity:.72;
  animation:phoneAura 5.5s ease-in-out infinite;
}

@keyframes phoneAura{
  0%,100%{
    transform:scale(1) translateY(0);
    opacity:.55;
  }
  50%{
    transform:scale(1.05) translateY(-4px);
    opacity:.88;
  }
}

/* glass reflection / screen depth */
.phone-overlay::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:32px;
  z-index:2;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.10) 0%,
      rgba(255,255,255,.02) 24%,
      transparent 55%,
      rgba(0,0,0,.08) 100%
    );
  pointer-events:none;
}

/* =========================
   TOP BADGE
========================= */

.spotify-badge{
  position:absolute;
  top:14px;
  left:14px;
  z-index:3;

  display:flex;
  align-items:center;
  gap:7px;

  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.16);

  color:#cbecf5;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
  backdrop-filter:blur(8px);
}

.spotify-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#1db954;
  box-shadow:0 0 8px rgba(29,185,84,.55);
}

/* =========================
   CONTENT
========================= */

.phone-content{
  position:relative;
  z-index:3;
  padding:18px 18px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* now playing card */
.now-playing{
  padding:12px 14px;
  border-radius:18px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

.now-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:rgba(203,236,245,.78);
  margin-bottom:7px;
}

.track{
  color:#eef7ff;
  font-size:15px;
  font-weight:700;
  line-height:1.15;
  text-shadow:0 0 8px rgba(43,39,114,.18);
}

.artist{
  margin-top:5px;
  color:#eef7ff;
  font-size:13px;
  opacity:.92;
  line-height:1.25;
}

/* lyric/video area */
.lyric-box{
  min-height:160px;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.lyric-line{
  color:#f3fbff;
  font-size:13px;
  font-weight:700;
  line-height:1.3;
  text-shadow:
    0 0 8px rgba(43,39,114,.22),
    0 0 18px rgba(0,169,186,.10);
  animation:lyricFade .45s ease;
}

@keyframes lyricFade{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* footer */
.phone-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;

  color:rgba(238,247,255,.82);
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.phone-mode{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.14);
}

/* equalizer */
.eq{
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:14px;
}

.eq span{
  width:3px;
  border-radius:999px;
  background:linear-gradient(180deg, #7f87ff, #00a9ba);
  animation:eqBounce 1.1s infinite ease-in-out;
}

.eq span:nth-child(1){ height:6px; animation-delay:.0s; }
.eq span:nth-child(2){ height:12px; animation-delay:.12s; }
.eq span:nth-child(3){ height:9px; animation-delay:.22s; }
.eq span:nth-child(4){ height:14px; animation-delay:.34s; }

@keyframes eqBounce{
  0%,100%{ transform:scaleY(.65); opacity:.7; }
  50%{ transform:scaleY(1.05); opacity:1; }
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-overlay">
    <div class="spotify-badge">
      <span class="spotify-dot"></span>
      <span>Spotify</span>
    </div>

    <div class="phone-content">
      <div class="now-playing">
        <div class="now-label">Now Playing</div>
        <div class="track" id="trackTitle">Loading track…</div>
        <div class="artist" id="trackArtist">Checking Spotify…</div>
      </div>

      <div class="lyric-box">
        <div class="lyric-line" id="lyricLine">✨ loading the vibe ✨</div>
      </div>

      <div class="phone-footer">
        <div class="phone-mode" id="modeLabel">music video mode</div>
        <div class="eq" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <img src="/widgets/phone/field-frame.png" alt="Field Transmission phone">
</div>

<script>
const LYRIC_ROTATE_MS = 7000;

const fallbackLyricPool = [
  "✨ drifting through the night ✨",
  "💫 lost in the glow 💫",
  "🌙 breathing in stardust 🌙",
  "💜 main character energy 💜",
  "🎶 soft chaos, perfect soundtrack 🎶",
  "✨ she is the music video now ✨",
  "🌌 moonbeam heart, skyline soul 🌌",
  "💖 dancing through the static 💖"
];

let currentTrack = "";
let currentArtist = "";
let lyricIndex = 0;

async function fetchSpotifyCurrent() {
  try {
    const res = await fetch("/spotify/current?nocache=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("spotify current failed");

    const data = await res.json();

    if (!data || data.is_playing === false || !data.item) {
      updateTrackUI("Nothing playing", "Silent disco standby");
      updateLyricUI("✨ waiting for the next anthem ✨");
      return;
    }

    const track = data.item?.name || "Unknown track";
    const artist = Array.isArray(data.item?.artists)
      ? data.item.artists.map(a => a.name).join(", ")
      : "Unknown artist";

    currentTrack = track;
    currentArtist = artist;

    updateTrackUI(track, artist);
    updateLyricUI(generateLyric(track, artist));
  } catch (err) {
    console.log("spotify current fetch failed", err);
    updateTrackUI("Spotify offline", "Using fallback vibe");
    updateLyricUI(fallbackLyricPool[Math.floor(Math.random() * fallbackLyricPool.length)]);
  }
}

function updateTrackUI(track, artist) {
  const titleEl = document.getElementById("trackTitle");
  const artistEl = document.getElementById("trackArtist");

  if (titleEl) titleEl.textContent = track;
  if (artistEl) artistEl.textContent = artist;
}

function updateLyricUI(text) {
  const lyricEl = document.getElementById("lyricLine");
  if (!lyricEl) return;

  lyricEl.textContent = text;
  lyricEl.style.animation = "none";
  void lyricEl.offsetWidth;
  lyricEl.style.animation = "lyricFade .45s ease";
}

function generateLyric(track, artist) {
  const key = `${track} ${artist}`.toLowerCase();

  if (key.includes("love")) return "💖 heart wide open 💖";
  if (key.includes("moon")) return "🌙 lit by lunar glow 🌙";
  if (key.includes("night")) return "✨ neon dreams after dark ✨";
  if (key.includes("dance")) return "💃 move like the beat knows you 💃";
  if (key.includes("dream")) return "☁️ floating where the melody lands ☁️";
  if (key.includes("gold")) return "✨ glowing like a secret anthem ✨";

  const options = [
    `${track} in my veins ✨`,
    `soundtracking the whole scene 💫`,
    `caught inside the chorus 🌙`,
    `the phone screen became a stage 💜`,
    `this is the cinematic part 🎶`,
    `turn the moment all the way up ✨`
  ];

  return options[lyricIndex % options.length];
}

function rotateLyric() {
  lyricIndex++;

  if (currentTrack || currentArtist) {
    updateLyricUI(generateLyric(currentTrack, currentArtist));
  } else {
    updateLyricUI(fallbackLyricPool[lyricIndex % fallbackLyricPool.length]);
  }
}

fetchSpotifyCurrent();
setInterval(fetchSpotifyCurrent, 10000);
setInterval(rotateLyric, LYRIC_ROTATE_MS);
</script>

</body>
</html>
