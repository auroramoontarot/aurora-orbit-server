<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phone Spotify Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Quicksand', sans-serif;
}

body{
  position:relative;
  pointer-events:none;
}

/*
  POSITION THIS WHOLE BLOCK OVER YOUR PHONE SCREEN.
  Adjust top/left/width/height until it fits your phone graphic.
*/
.phone-overlay{
  position:absolute;
  top:120px;     /* adjust */
  left:120px;    /* adjust */
  width:260px;   /* adjust */
  height:460px;  /* adjust */

  border-radius:28px;
  overflow:hidden;

  display:flex;
  flex-direction:column;
  justify-content:flex-end;

  background:
    linear-gradient(180deg, rgba(10,12,20,0.06), rgba(10,12,20,0.24)),
    radial-gradient(circle at top, rgba(127,135,255,.12), transparent 45%),
    radial-gradient(circle at bottom, rgba(0,169,186,.12), transparent 50%);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05),
    inset 0 -40px 80px rgba(0,0,0,.20);

  isolation:isolate;
}

/* subtle moving music glow */
.phone-overlay::before{
  content:"";
  position:absolute;
  inset:-12%;
  z-index:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(127,135,255,.22), transparent 32%),
    radial-gradient(circle at 70% 65%, rgba(0,169,186,.22), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(198,199,248,.16), transparent 40%);
  filter:blur(16px);
  opacity:.55;
  animation:phoneAura 5.5s ease-in-out infinite;
}

@keyframes phoneAura{
  0%,100%{
    transform:scale(1) translateY(0);
    opacity:.42;
  }
  50%{
    transform:scale(1.05) translateY(-4px);
    opacity:.78;
  }
}

/* dark readability layer */
.phone-overlay::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  background:
    linear-gradient(180deg, transparent 0%, transparent 40%, rgba(0,0,0,.18) 68%, rgba(0,0,0,.58) 100%);
}

/* top tiny spotify badge */
.spotify-badge{
  position:absolute;
  top:14px;
  left:14px;
  z-index:2;

  display:flex;
  align-items:center;
  gap:7px;

  padding:6px 10px;
  border-radius:999px;
  background:rgba(12,16,30,.48);
  border:1px solid rgba(255,255,255,.08);

  color:#cbecf5;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
  backdrop-filter:blur(8px);
}

.spotify-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#1db954;
  box-shadow:0 0 8px rgba(29,185,84,.55);
}

/* content */
.phone-content{
  position:relative;
  z-index:2;
  padding:18px 18px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* now playing card */
.now-playing{
  padding:12px 14px;
  border-radius:18px;
  background:rgba(12,16,30,.46);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

.now-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:rgba(203,236,245,.62);
  margin-bottom:7px;
}

.track{
  color:#ffffff;
  font-size:18px;
  font-weight:700;
  line-height:1.15;
  text-shadow:0 0 10px rgba(0,0,0,.28);
}

.artist{
  margin-top:5px;
  color:#cbecf5;
  font-size:12px;
  opacity:.88;
  line-height:1.25;
}

/* lyric/video line area */
.lyric-box{
  min-height:110px;
  padding:14px 16px;
  border-radius:22px;
  background:rgba(12,16,30,.42);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.lyric-line{
  color:#ffffff;
  font-size:24px;
  font-weight:700;
  line-height:1.2;
  text-shadow:
    0 0 12px rgba(0,0,0,.48),
    0 0 28px rgba(0,0,0,.24);
  animation:lyricFade .45s ease;
}

@keyframes lyricFade{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* tiny footer */
.phone-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;

  color:rgba(203,236,245,.68);
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.phone-mode{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(12,16,30,.42);
  border:1px solid rgba(255,255,255,.06);
}

/* equalizer bars */
.eq{
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:14px;
}

.eq span{
  width:3px;
  border-radius:999px;
  background:linear-gradient(180deg, #7f87ff, #00a9ba);
  animation:eqBounce 1.1s infinite ease-in-out;
}

.eq span:nth-child(1){ height:6px; animation-delay:.0s; }
.eq span:nth-child(2){ height:12px; animation-delay:.12s; }
.eq span:nth-child(3){ height:9px; animation-delay:.22s; }
.eq span:nth-child(4){ height:14px; animation-delay:.34s; }

@keyframes eqBounce{
  0%,100%{ transform:scaleY(.65); opacity:.7; }
  50%{ transform:scaleY(1.05); opacity:1; }
}
</style>
</head>
<body>

<div class="phone-overlay">
  <div class="spotify-badge">
    <span class="spotify-dot"></span>
    <span>Spotify</span>
  </div>

  <div class="phone-content">
    <div class="now-playing">
      <div class="now-label">Now Playing</div>
      <div class="track" id="trackTitle">Loading track…</div>
      <div class="artist" id="trackArtist">Checking Spotify…</div>
    </div>

    <div class="lyric-box">
      <div class="lyric-line" id="lyricLine">✨ loading the vibe ✨</div>
    </div>

    <div class="phone-footer">
      <div class="phone-mode" id="modeLabel">music video mode</div>
      <div class="eq" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>
</div>

<script>
const LYRIC_ROTATE_MS = 7000;

/*
  These are fallback lyric/caption vibes.
  Replace with your own lines any time.
*/
const fallbackLyricPool = [
  "✨ drifting through the night ✨",
  "💫 lost in the glow 💫",
  "🌙 breathing in stardust 🌙",
  "💜 main character energy 💜",
  "🎶 soft chaos, perfect soundtrack 🎶",
  "✨ she is the music video now ✨",
  "🌌 moonbeam heart, skyline soul 🌌",
  "💖 dancing through the static 💖"
];

let currentTrack = "";
let currentArtist = "";
let lyricIndex = 0;

async function fetchSpotifyCurrent() {
  try {
    const res = await fetch("/spotify/current?nocache=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("spotify current failed");

    const data = await res.json();

    if (!data || data.is_playing === false || !data.item) {
      updateTrackUI("Nothing playing", "Silent disco standby");
      updateLyricUI("✨ waiting for the next anthem ✨");
      return;
    }

    const track = data.item?.name || "Unknown track";
    const artist = Array.isArray(data.item?.artists)
      ? data.item.artists.map(a => a.name).join(", ")
      : "Unknown artist";

    currentTrack = track;
    currentArtist = artist;

    updateTrackUI(track, artist);
    updateLyricUI(generateLyric(track, artist));
  } catch (err) {
    console.log("spotify current fetch failed", err);
    updateTrackUI("Spotify offline", "Using fallback vibe");
    updateLyricUI(fallbackLyricPool[Math.floor(Math.random() * fallbackLyricPool.length)]);
  }
}

function updateTrackUI(track, artist) {
  const titleEl = document.getElementById("trackTitle");
  const artistEl = document.getElementById("trackArtist");

  if (titleEl) titleEl.textContent = track;
  if (artistEl) artistEl.textContent = artist;
}

function updateLyricUI(text) {
  const lyricEl = document.getElementById("lyricLine");
  if (!lyricEl) return;

  lyricEl.textContent = text;
  lyricEl.style.animation = "none";
  void lyricEl.offsetWidth;
  lyricEl.style.animation = "lyricFade .45s ease";
}

function generateLyric(track, artist) {
  const key = `${track} ${artist}`.toLowerCase();

  if (key.includes("love")) return "💖 heart wide open 💖";
  if (key.includes("moon")) return "🌙 lit by lunar glow 🌙";
  if (key.includes("night")) return "✨ neon dreams after dark ✨";
  if (key.includes("dance")) return "💃 move like the beat knows you 💃";
  if (key.includes("dream")) return "☁️ floating where the melody lands ☁️";
  if (key.includes("gold")) return "✨ glowing like a secret anthem ✨";

  const options = [
    `${track} in my veins ✨`,
    `soundtracking the whole scene 💫`,
    `caught inside the chorus 🌙`,
    `the phone screen became a stage 💜`,
    `this is the cinematic part 🎶`,
    `turn the moment all the way up ✨`
  ];

  return options[lyricIndex % options.length];
}

function rotateLyric() {
  lyricIndex++;

  if (currentTrack || currentArtist) {
    updateLyricUI(generateLyric(currentTrack, currentArtist));
  } else {
    updateLyricUI(fallbackLyricPool[lyricIndex % fallbackLyricPool.length]);
  }
}

fetchSpotifyCurrent();
setInterval(fetchSpotifyCurrent, 10000);
setInterval(rotateLyric, LYRIC_ROTATE_MS);
</script>

</body>
</html>
