<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmic Co-Working Corner</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --lavender: #7f87ff;
    --teal: #00a9ba;
    --ice: #cbecf5;
    --soft: #c6c7f8;
    --deep: #2b2772;
    --panel: rgba(18, 18, 48, 0.88);
    --line: rgba(203, 236, 245, 0.38);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: transparent;
    font-family: "Quicksand", sans-serif;
    color: var(--ice);
    overflow: hidden;
  }

  .corner-widget {
    width: 420px;
    padding: 12px;
    border: 3px double var(--soft);
    background:
      radial-gradient(circle at 20% 20%, rgba(127,135,255,0.35), transparent 28%),
      radial-gradient(circle at 80% 10%, rgba(0,169,186,0.28), transparent 30%),
      linear-gradient(145deg, rgba(43,39,114,0.96), var(--panel));
    box-shadow:
      0 0 18px rgba(0,169,186,0.45),
      inset 0 0 18px rgba(203,236,245,0.12);
    image-rendering: pixelated;
  }

  .pixel-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid var(--line);
    padding: 6px 8px;
    background: rgba(0,0,0,0.25);
    margin-bottom: 8px;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-shadow: 0 0 8px var(--teal);
  }

  .badge {
    font-size: 11px;
    color: var(--deep);
    background: var(--ice);
    border: 2px outset var(--soft);
    padding: 2px 6px;
    font-weight: 700;
  }

  .marquee-box {
    border: 2px inset var(--soft);
    background: rgba(0,0,0,0.35);
    padding: 3px 0;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--soft);
  }

  .orbit-card {
    border: 2px ridge var(--lavender);
    background: rgba(255,255,255,0.08);
    padding: 12px;
    text-align: center;
    min-height: 130px;
    position: relative;
  }

  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.55;
    background-image:
      radial-gradient(circle, rgba(203,236,245,0.9) 1px, transparent 1px),
      radial-gradient(circle, rgba(198,199,248,0.8) 1px, transparent 1px);
    background-size: 24px 24px, 37px 37px;
    animation: twinkle 4s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.25; }
    to { opacity: 0.7; }
  }

  .current-label {
    position: relative;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--soft);
    margin-bottom: 4px;
  }

  .creator-name {
    position: relative;
    font-size: 25px;
    font-weight: 700;
    color: var(--ice);
    text-shadow: 0 0 10px var(--teal);
    margin-bottom: 4px;
  }

  .creator-meta {
    position: relative;
    font-size: 14px;
    color: var(--soft);
    line-height: 1.35;
    margin-bottom: 8px;
  }

  .status {
    position: relative;
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border: 1px solid var(--line);
    background: rgba(0,169,186,0.22);
    color: var(--ice);
    text-transform: uppercase;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }

  button, a.portal-button {
    font-family: "Quicksand", sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--deep);
    background: linear-gradient(180deg, var(--ice), var(--soft));
    border: 2px outset var(--soft);
    padding: 7px 6px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }

  button:active, a.portal-button:active {
    border-style: inset;
  }

  .footer {
    margin-top: 8px;
    font-size: 11px;
    text-align: center;
    color: var(--soft);
    opacity: 0.9;
  }

  .tiny-links {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 7px;
  }

  .tiny-links a {
    font-size: 11px;
    color: var(--ice);
    text-decoration: none;
    border-bottom: 1px dotted var(--ice);
  }

  .error {
    color: #ffd6f7;
    font-size: 14px;
    text-align: center;
    padding: 18px 8px;
  }
</style>
</head>

<body>

<div class="corner-widget">
  <div class="pixel-top">
    <div class="title">☄ Cosmic Co-Working Corner</div>
    <div class="badge">WEBRING</div>
  </div>

  <div class="marquee-box">
    <marquee scrollamount="3">
      ✨ welcome to the cozy creator orbit ✨ hydrate ✨ stretch ✨ low spoons welcome ✨ click a portal and find another desk ✨
    </marquee>
  </div>

  <div class="orbit-card" id="orbitCard">
    <div class="stars"></div>

    <div class="current-label">currently orbiting</div>
    <div class="creator-name" id="creatorName">Loading...</div>
    <div class="creator-meta" id="creatorMeta">Gathering stardust...</div>
    <div class="status" id="creatorStatus">connecting</div>

    <div class="buttons">
      <button id="prevBtn">◀ prev</button>
      <a id="visitBtn" class="portal-button" href="#" target="_blank" rel="noopener">visit ✦</a>
      <button id="nextBtn">next ▶</button>
    </div>
  </div>

  <div class="tiny-links">
    <a href="#" id="randomBtn">random portal</a>
    <a href="#" id="homeBtn">join the orbit</a>
  </div>

  <div class="footer">
    visitor #000013 ✦ handcrafted cozy web portals
  </div>
</div>

<script>
  const DATA_URL = "/data/cosmic-corner.json";

  let creators = [];
  let currentIndex = 0;

  const creatorName = document.getElementById("creatorName");
  const creatorMeta = document.getElementById("creatorMeta");
  const creatorStatus = document.getElementById("creatorStatus");
  const visitBtn = document.getElementById("visitBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const randomBtn = document.getElementById("randomBtn");
  const homeBtn = document.getElementById("homeBtn");

  homeBtn.href = "https://scatterstardust.com/join-the-orbit";

  function normalizeCreator(creator) {
    return {
      name: creator.name || "Mystery Desk",
      url: creator.url || "#",
      shift: creator.shift || "Open Orbit",
      vibe: creator.vibe || "cozy co-working energy",
      status: creator.status || "offline"
    };
  }

  function renderCreator(index) {
    if (!creators.length) return;

    const creator = normalizeCreator(creators[index]);

    creatorName.textContent = creator.name;
    creatorMeta.innerHTML = `
      ${creator.shift}<br>
      ${creator.vibe}
    `;
    creatorStatus.textContent = creator.status;
    visitBtn.href = creator.url;
  }

  function nextCreator() {
    currentIndex = (currentIndex + 1) % creators.length;
    renderCreator(currentIndex);
  }

  function prevCreator() {
    currentIndex = (currentIndex - 1 + creators.length) % creators.length;
    renderCreator(currentIndex);
  }

  function randomCreator(event) {
    event.preventDefault();

    if (creators.length <= 1) {
      renderCreator(currentIndex);
      return;
    }

    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * creators.length);
    } while (newIndex === currentIndex);

    currentIndex = newIndex;
    renderCreator(currentIndex);
  }

  async function loadCreators() {
    try {
      const response = await fetch(DATA_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error(`Could not load ${DATA_URL}`);
      }

      creators = await response.json();

      if (!Array.isArray(creators) || creators.length === 0) {
        throw new Error("No creators found in cosmic-corner.json");
      }

      renderCreator(currentIndex);
    } catch (error) {
      document.getElementById("orbitCard").innerHTML = `
        <div class="error">
          ✦ Cosmic signal lost ✦<br>
          Check /public/data/cosmic-corner.json
        </div>
      `;
      console.error(error);
    }
  }

  prevBtn.addEventListener("click", prevCreator);
  nextBtn.addEventListener("click", nextCreator);
  randomBtn.addEventListener("click", randomCreator);

  loadCreators();
</script>

</body>
</html>
