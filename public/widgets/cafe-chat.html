<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Moonbeam Scattered Notes Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  font-family:'Quicksand',sans-serif;
}

:root{
  --lav:#7f87ff;
  --teal:#00a9ba;
  --ice:#cbecf5;
  --mist:#c6c7f8;
}

/* ENTIRE CHAT AREA */

.chat-wrap{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
}

/* NOTES */

.note{
  position:absolute;

  width:max-content;
  max-width:190px;
  min-width:135px;

  padding:14px 14px 15px 14px;

  border-radius:14px;

  background:
    linear-gradient(
      145deg,
      rgba(255,248,238,.96),
      rgba(255,244,230,.92)
    );

  border:1px solid rgba(140,120,90,.14);

  box-shadow:
    0 8px 18px rgba(0,0,0,.16),
    inset 0 1px 0 rgba(255,255,255,.4);

  color:#3b2e2a;

  opacity:0;

  transform-origin:center;

  animation:
    noteIn .6s ease forwards,
    floaty 6s ease-in-out infinite;

  backdrop-filter:blur(4px);

  word-break:break-word;
}

/* DIFFERENT NOTE COLORS */

.note.mod{
  background:
    linear-gradient(
      145deg,
      rgba(230,255,255,.96),
      rgba(214,248,255,.92)
    );
}

.note.sub{
  background:
    linear-gradient(
      145deg,
      rgba(248,240,255,.96),
      rgba(235,226,255,.92)
    );
}

.note.self{
  background:
    linear-gradient(
      145deg,
      rgba(240,245,255,.96),
      rgba(222,232,255,.92)
    );
}

/* TAPE */

.note::before{
  content:"";

  position:absolute;

  top:-6px;
  left:50%;

  transform:translateX(-50%) rotate(-2deg);

  width:48px;
  height:11px;

  border-radius:3px;

  background:rgba(246,217,143,.36);

  box-shadow:
    0 1px 2px rgba(0,0,0,.08),
    inset 0 0 4px rgba(255,255,255,.25);
}

/* STAR PIN */

.note::after{
  content:"✦";

  position:absolute;

  top:-11px;
  right:10px;

  color:#f6c177;

  font-size:11px;

  text-shadow:
    0 0 6px rgba(246,193,119,.35);
}

/* META */

.meta{
  display:flex;
  align-items:center;
  gap:6px;

  margin-bottom:4px;

  font-size:8px;
  letter-spacing:1px;
  text-transform:uppercase;

  opacity:.65;
}

.tag{
  padding:2px 6px;

  border-radius:999px;

  background:rgba(255,255,255,.45);

  border:1px solid rgba(120,90,60,.1);

  font-size:9px;
  font-weight:700;
}

.content{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.user{
  font-weight:700;
  font-size:11px;
  color:#645cff;

  padding-bottom:2px;

  border-bottom:
    1px dashed rgba(100,100,100,.18);

  letter-spacing:.3px;
}

.text{
  font-size:11px;
  line-height:1.35;
  color:#3b2e2a;

  padding-top:2px;

  word-wrap:break-word;
}

.note.mod .user{
  color:#008e9c;
}

.note.self .user{
  color:#4d56d8;
}

/* OLDER NOTES */

.note.old{
  opacity:.35 !important;
  filter:saturate(.7);
}

/* ANIMATIONS */

@keyframes noteIn{
  0%{
    opacity:0;
    transform:
      translateY(18px)
      scale(.92)
      rotate(var(--rotate));
  }

  100%{
    opacity:1;
    transform:
      translateY(0)
      scale(1)
      rotate(var(--rotate));
  }
}

@keyframes floaty{
  0%,100%{
    margin-top:0;
  }

  50%{
    margin-top:-3px;
  }
}

</style>
</head>

<body>

<div class="chat-wrap" id="chatWrap"></div>

<audio id="astreaChime"
src="/widgets/sounds/moonbeam.mp3"
preload="auto"></audio>

<script>

const MAX_MESSAGES = 6;

const wrap = document.getElementById("chatWrap");

let currentAudio = null;

/* RANDOM NOTE POSITIONS */

function getRandomPosition(noteWidth){

  const estimatedHeight = 190;

  const padding = 24;

  const maxX =
    window.innerWidth -
    noteWidth -
    padding;

  const maxY =
    window.innerHeight -
    estimatedHeight -
    padding;

  return {

    x:
      Math.random() *
      Math.max(maxX, 20),

    y:
      Math.random() *
      Math.max(maxY, 20)

  };
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function getTimeStamp(){

  const now = new Date();

  return now.toLocaleTimeString([],{
    hour:"numeric",
    minute:"2-digit"
  });
}

function buildRoleTag(data){

  if(data.broadcaster) return "Host";
  if(data.mod) return "Mod";
  if(data.subscriber) return "Moonbeam";

  return "Signal";
}

/* AGING */

function refreshAges(){

  const notes = [...wrap.querySelectorAll(".note")];

  notes.forEach((el,index)=>{

    el.classList.remove("old");

    if(index < notes.length - 2){
      el.classList.add("old");
    }
  });
}

/* REMOVE OLDEST */

function removeOldestIfNeeded(){

  while(wrap.querySelectorAll(".note").length > MAX_MESSAGES){

    const first =
      wrap.querySelector(".note");

    if(first){
      first.remove();
    }
  }
}

/* ADD NOTE */

function addMessage(data){

  const note =
    document.createElement("div");

  note.className = "note";

  const widths = [145,160,175,190];

  const selectedWidth =
    widths[
      Math.floor(Math.random() * widths.length)
    ];

  note.style.width =
    selectedWidth + "px";

  if(data.broadcaster){
    note.classList.add("self");
  }
  else if(data.mod){
    note.classList.add("mod");
  }
  else if(data.subscriber){
    note.classList.add("sub");
  }

  /* RANDOM POSITION */

  const pos =
    getRandomPosition(selectedWidth);

  const rotate =
    (Math.random() * 6 - 3).toFixed(2);

  note.style.left = pos.x + "px";
  note.style.top = pos.y + "px";

  note.style.setProperty(
    "--rotate",
    rotate + "deg"
  );

  note.innerHTML = `

    <div class="meta">
      <span class="tag">
        ${buildRoleTag(data)}
      </span>

      <span>
        ${getTimeStamp()}
      </span>
    </div>

    <div class="content">

      <div class="user">
        ${escapeHtml(data.user)}
      </div>

      <div class="text">
        ${escapeHtml(data.text)}
      </div>

    </div>

  `;

  wrap.appendChild(note);

  removeOldestIfNeeded();

  refreshAges();

  /* AUTO FADE */

  setTimeout(()=>{

    note.style.transition =
      "opacity 1.4s ease";

    note.style.opacity = "0";

    setTimeout(()=>{
      note.remove();
    },1400);

  },28000);

}

/* TTS */

async function playTTS(text, mode="astrea"){

  try{

    const res = await fetch("/tts",{
      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        text,
        mode
      })
    });

    if(!res.ok){
      throw new Error("TTS failed");
    }

    const blob = await res.blob();

    if(currentAudio){

      currentAudio.pause();

      currentAudio = null;
    }

    const chime =
      document.getElementById("astreaChime");

    if(chime && mode === "astrea"){

      chime.volume = 0.3;

      chime.currentTime = 0;

      await chime.play();
    }

    await new Promise(r =>
      setTimeout(r,350)
    );

    const url =
      URL.createObjectURL(blob);

    const audio =
      new Audio(url);

    currentAudio = audio;

    audio.volume = 0.8;

    audio.onended = ()=>{

      URL.revokeObjectURL(url);
    };

    await audio.play();

  }catch(err){

    console.error(
      "TTS failed:",
      err
    );
  }
}

/* CHAT STREAM */

const stream =
  new EventSource("/chatstream");

stream.onmessage =
async (event)=>{

  try{

    const data =
      JSON.parse(event.data);

    if(data.type === "message"){

      addMessage(data);

      return;
    }

    if(data.type === "tts"){

      await playTTS(
        data.text,
        data.mode || "astrea"
      );

      return;
    }

    if(data.type === "astrea"){

      await playTTS(
        data.text,
        "astrea"
      );

      return;
    }

    if(data.type === "aurora"){

      await playTTS(
        data.text,
        "aurora"
      );

      return;
    }

  }catch(err){

    console.error(
      "Bad payload:",
      err
    );
  }
};

</script>

</body>
</html>
