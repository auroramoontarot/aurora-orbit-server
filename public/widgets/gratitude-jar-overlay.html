<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>The Constellation Jar</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --lav:#7f87ff;
  --teal:#00a9ba;
  --ice:#cbecf5;
  --soft:#c6c7f8;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:transparent;
  font-family:'Quicksand',sans-serif;
  color:var(--ice);
}

.jar-widget{
  position:absolute;
  left:40px;
  bottom:40px;
  width:380px;
  min-height:260px;
  padding:24px;
  border-radius:30px;
  background:rgba(12,16,35,.62);
  border:1px solid rgba(203,236,245,.22);
  box-shadow:
    0 0 30px rgba(0,169,186,.25),
    inset 0 0 28px rgba(127,135,255,.12);
  backdrop-filter:blur(14px);
}

.title{
  font-size:21px;
  font-weight:700;
  color:white;
  text-shadow:0 0 14px rgba(127,135,255,.9);
  margin-bottom:14px;
}

.jar{
  position:relative;
  height:130px;
  margin:8px auto 18px;
  width:145px;
  border-radius:24px 24px 40px 40px;
  border:2px solid rgba(203,236,245,.45);
  background:
    radial-gradient(circle at 45% 35%, rgba(255,255,255,.22), transparent 18%),
    linear-gradient(180deg, rgba(203,236,245,.16), rgba(127,135,255,.1));
  box-shadow:0 0 24px rgba(0,169,186,.3);
  overflow:hidden;
}

.jar:before{
  content:"";
  position:absolute;
  top:-8px;
  left:28px;
  width:88px;
  height:22px;
  border-radius:16px;
  border:2px solid rgba(203,236,245,.5);
  background:rgba(255,255,255,.12);
}

@keyframes floatStar{
  0%,100%{ transform:translateY(0) scale(1); opacity:.75; }
  50%{ transform:translateY(-10px) scale(1.12); opacity:1; }
}

.label{
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--soft);
  text-align:center;
  margin-bottom:8px;
}

.note{
  font-size:22px;
  line-height:1.35;
  text-align:center;
  color:white;
  text-shadow:0 0 14px rgba(0,169,186,.45);
  transition:opacity .7s ease, transform .7s ease;
}

.meta{
  margin-top:12px;
  text-align:center;
  font-size:14px;
  color:var(--soft);
}

.count{
  margin-top:14px;
  text-align:center;
  font-size:13px;
  letter-spacing:.08em;
  color:rgba(203,236,245,.7);
}

.star{
  position:absolute;
  animation:floatStar ease-in-out infinite;
  opacity:.9;
  text-shadow:0 0 12px currentColor;
  pointer-events:none;
}

.fade{
  opacity:0;
  transform:translateY(8px);
}
</style>
</head>

<body>
  <section class="jar-widget">
    <div class="title">☄ The Constellation Jar</div>

    <div class="jar" id="jar"></div>

    <div class="label" id="label">tiny joy detected</div>
    <div class="note" id="note">The jar is waiting for stardust…</div>
    <div class="meta" id="meta">🌙</div>
<div class="count" id="count">
  0 stars collected ✨
</div>
  </section>

<script>
const DATA_URL = "/data/gratitude-jar.json";
const noteEl = document.getElementById("note");
const labelEl = document.getElementById("label");
const metaEl = document.getElementById("meta");
const jarEl = document.getElementById("jar");
const countEl = document.getElementById("count");

let entries = [];
let index = 0;

const labels = {
  "tiny-joy":"tiny joy detected",
  "affirmation":"affirmation received",
  "comfort":"comfort signal received",
  "spoonie-win":"spoonie win collected",
  "moonbeam":"moonbeam moment archived",
  "tiny-victory":"tiny victory logged",
  "cozy":"cozy little sparkle",
  "chaos-goblin":"chaos goblin blessing"
};

function generateConstellationStars(total){

  jarEl.innerHTML = "";

  const maxStars = Math.min(total, 60);

  for(let i = 0; i < maxStars; i++){

    const star = document.createElement("div");

    star.className = "star";

    const symbols = ["✦","✧","⋆","·"];
    star.textContent = symbols[Math.floor(Math.random() * symbols.length)];

    const colors = [
      "#c6c7f8",
      "#7f87ff",
      "#00a9ba",
      "#cbecf5"
    ];

    star.style.color =
      colors[Math.floor(Math.random() * colors.length)];

    star.style.left = Math.random() * 110 + 12 + "px";
    star.style.bottom = Math.random() * 92 + 10 + "px";

    star.style.fontSize =
      (12 + Math.random() * 12) + "px";

    star.style.animationDuration =
      (4 + Math.random() * 5) + "s";

    star.style.animationDelay =
      (Math.random() * 5) + "s";

    jarEl.appendChild(star);
  }

  countEl.textContent =
    `${total} stars collected ✨`;
}

async function loadEntries(){
  try{
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    const data = await res.json();

    if(Array.isArray(data) && data.length){
  entries = data;

  generateConstellationStars(entries.length);

  showRandomEntry();
}
  }catch(err){
    console.error("Could not load gratitude jar", err);
  }
}

function showRandomEntry(){
  if(!entries.length) return;

  index = Math.floor(Math.random() * entries.length);
  const item = entries[index];

  noteEl.classList.add("fade");

  setTimeout(() => {
    noteEl.textContent = `“${item.text}”`;
    labelEl.textContent = labels[item.type] || "stardust collected";
    metaEl.textContent = `${prettyType(item.type)} · ${item.date || "today"} ✨`;
    noteEl.classList.remove("fade");
  }, 700);
}

function prettyType(type){
  if(!type) return "stardust";
  return type.replaceAll("-", " ");
}

loadEntries();

setInterval(showRandomEntry, 25000);
setInterval(loadEntries, 60000);
</script>
</body>
</html>
