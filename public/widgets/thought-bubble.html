<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Thought Bubble</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bubble:#cbecf5;
      --bubble-soft:#e8f7fb;
      --text:#2b2772;
      --aurora:#00a9ba;
      --shadow:rgba(0,0,0,.18);
      --glow:rgba(0,169,186,.18);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
      font-family:'Quicksand',sans-serif;
    }
    .scene{
      position:relative;
      width:1280px;
      height:720px;
      overflow:hidden;
      pointer-events:none;
    }
    .bubble-wrap{
      position:absolute;
      left:700px;
      top:355px;
      width:440px;
      opacity:0;
      transform:translateY(14px) scale(.96);
      transition:opacity .35s ease, transform .6s ease;
      filter:drop-shadow(0 10px 20px var(--shadow));
    }
    .bubble-wrap.visible{
      opacity:1;
      transform:translateY(0) scale(1);
    }
    .bubble{
      position:relative;
      min-height:140px;
      padding:20px 24px 22px 24px;
      border-radius:42px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.92), transparent 28%),
        radial-gradient(circle at top right, rgba(127,135,255,.16), transparent 30%),
        linear-gradient(180deg, var(--bubble-soft) 0%, var(--bubble) 100%);
      border:2px solid rgba(255,255,255,.78);
      box-shadow:
        0 0 24px var(--glow),
        inset 0 0 10px rgba(255,255,255,.45),
        inset 0 -8px 18px rgba(127,135,255,.08);
      overflow:hidden;
    }
    .bubble::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:42px;
      background:linear-gradient(180deg, rgba(255,255,255,.35), transparent 30%);
    }
    .bubble::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.35);
      opacity:.7;
    }
    .thought-tail{
  position:absolute;
  right:84px;
  bottom:-52px;
  width:120px;
  height:70px;
}

/* rounded star thought bubbles */
.thought-tail span{
  position:absolute;
  display:block;

  width:100%;
  height:100%;

  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,.95), transparent 32%),
    linear-gradient(180deg, var(--bubble-soft) 0%, var(--bubble) 100%);

  border:2px solid rgba(255,255,255,.78);
  box-shadow:
    0 0 14px rgba(0,169,186,.16),
    inset 0 0 8px rgba(255,255,255,.35);

  /* ⭐ softer rounded star */
  clip-path: polygon(
    50% 8%,
    60% 32%,
    85% 35%,
    65% 55%,
    72% 80%,
    50% 65%,
    28% 80%,
    35% 55%,
    15% 35%,
    40% 32%
  );

  border-radius:6px; /* ← THIS softens the star points */

  animation:starTailTwinkle 2.8s ease-in-out infinite;
}

/* largest star closest to bubble/right, smaller stars trail left */
.thought-tail span:nth-child(1){
  width:32px;
  height:32px;
  right:0;
  top:8px;
  animation-delay:0s;
}

.thought-tail span:nth-child(2){
  width:22px;
  height:22px;
  right:38px;
  top:34px;
  animation-delay:.35s;
}

.thought-tail span:nth-child(3){
  width:14px;
  height:14px;
  right:70px;
  top:54px;
  animation-delay:.7s;
}

@keyframes starTailTwinkle{
  0%,100%{
    opacity:.72;
    transform:scale(.92) rotate(-6deg);
    filter:drop-shadow(0 0 2px rgba(0,169,186,.25));
  }
  50%{
    opacity:1;
    transform:scale(1.08) rotate(6deg);
    filter:drop-shadow(0 0 7px rgba(0,169,186,.45));
  }
}
    .label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
      color:#4d57a6;
      font-size:11px;
      font-weight:700;
      letter-spacing:1.2px;
      text-transform:uppercase;
      opacity:.85;
    }
    .label-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--aurora);
      box-shadow:0 0 8px rgba(0,169,186,.55), 0 0 16px rgba(127,135,255,.2);
      flex-shrink:0;
    }
    .bubble-text{
      position:relative;
      z-index:1;
      color:var(--text);
      font-size:28px;
      line-height:1.28;
      font-weight:700;
      letter-spacing:.2px;
      word-wrap:break-word;
      overflow-wrap:break-word;
      text-shadow:0 1px 0 rgba(255,255,255,.35);
    }
    .bubble-wrap.idle .bubble-text{
      font-size:22px;
      font-weight:600;
      color:#4d57a6;
      opacity:.85;
    }
    .sparkle{
      position:absolute;
      top:14px;
      right:18px;
      font-size:15px;
      color:#7f87ff;
      opacity:.55;
      animation:twinkle 3.2s ease-in-out infinite;
    }
    @keyframes twinkle{
      0%,100%{ opacity:.28; transform:scale(.95) rotate(0deg); }
      50%{ opacity:.72; transform:scale(1.08) rotate(10deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bubble-wrap visible idle" id="bubbleWrap">
      <div class="bubble">
        <div class="sparkle">✦</div>
        <div class="label"><span class="label-dot"></span>Aurora Glimmers ✦</div>
        <div class="bubble-text" id="bubbleText">Gathering Stardust...</div>
      </div>
      <div class="thought-tail"><span></span><span></span><span></span></div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:3000";
    const bubbleWrap = document.getElementById("bubbleWrap");
    const bubbleText = document.getElementById("bubbleText");

    function applyState(state) {
      const text = String(state?.text || "").trim();
      const visible = state?.visible !== false;

      bubbleWrap.classList.toggle("visible", visible);

      if (text) {
        bubbleText.textContent = text;
        bubbleWrap.classList.remove("idle");
      } else {
        bubbleText.textContent = "\u00A0"; // invisible space
        bubbleWrap.classList.add("idle");
      }
    }

    async function loadInitial() {
      try {
        const res = await fetch(`${API_BASE}/thought-bubble`, { cache: "no-store" });
        const data = await res.json();
        applyState(data);
      } catch (err) {
        console.error("Initial bubble load failed:", err);
      }
    }

    function connectStream() {
      const stream = new EventSource(`${API_BASE}/thought-bubble/stream`);

      stream.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          applyState(data);
        } catch (err) {
          console.error("Bubble stream parse failed:", err);
        }
      };

      stream.onerror = () => {
        stream.close();
        setTimeout(connectStream, 3000);
      };
    }

    loadInitial();
    connectStream();
  </script>
</body>
</html>
