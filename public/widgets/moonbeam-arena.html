<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonbeam Arena</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  font-family:'Quicksand', sans-serif;
  color:#cbecf5;
}

#arena{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* SOFT AURORA / ATMOSPHERE */
#arena::before{
  content:"";
  position:absolute;
  inset:-20%;

  background:
    radial-gradient(circle at 20% 20%, rgba(127,135,255,.18), transparent 35%),
    radial-gradient(circle at 75% 25%, rgba(0,169,186,.16), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(198,199,248,.10), transparent 45%);

  filter:blur(60px);
  animation:auroraFloat 18s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:0;
}

@keyframes auroraFloat{
  from{ transform:translateX(-2%) translateY(0); }
  to{ transform:translateX(2%) translateY(-1%); }
}

/* MAIN PANEL */
.overlay{
  position:absolute;
  left:20px;
  top:20px;

  width:420px;
  max-width:calc(100vw - 40px);

  display:flex;
  flex-direction:column;
  gap:10px;

  z-index:2;

  max-height:calc(100vh - 40px);
  overflow:hidden;

  padding:4px 10px 8px 2px;
  box-sizing:border-box;

  filter:
    drop-shadow(0 0 12px rgba(127,135,255,.25))
    drop-shadow(0 0 24px rgba(0,169,186,.15));
}

/* GLASS PANEL SYSTEM */
.panel{
  position:relative;

  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;

  padding:10px 14px;

  backdrop-filter:blur(18px) saturate(1.25);
  -webkit-backdrop-filter:blur(18px) saturate(1.25);

  box-shadow:
    0 8px 22px rgba(0,0,0,.18),
    0 0 10px rgba(127,135,255,.12);

  overflow:hidden;
  isolation:isolate;
}

.panel::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,.22),
    rgba(255,255,255,.05) 35%,
    transparent 65%
  );

  pointer-events:none;
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;

  background:linear-gradient(
    120deg,
    rgba(255,255,255,.14),
    rgba(255,255,255,.04),
    transparent
  );

  opacity:.45;
  pointer-events:none;
}

/* HEADER */
#title{
  font-size:14px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  opacity:.78;
  margin-bottom:6px;
  position:relative;
  z-index:2;
}

#mainText{
  font-size:32px;
  font-weight:700;
  line-height:1.1;
  text-shadow:0 0 18px rgba(0,169,186,.35);
  position:relative;
  z-index:2;
}

#subText{
  margin-top:6px;
  font-size:16px;
  opacity:.82;
  position:relative;
  z-index:2;
}

/* SCORE BOX */
#scoreBox{
  display:flex;
  flex-direction:column;
  gap:6px;
  opacity:0;
  transition:opacity .35s ease;
}

.scoreRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:10px;
  position:relative;
  z-index:2;
}

.team{
  font-size:18px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.team.left{
  text-align:left;
}

.team.right{
  text-align:right;
}

#score{
  font-size:28px;
  font-weight:700;
  text-shadow:0 0 16px rgba(127,135,255,.35);
  min-width:72px;
  text-align:center;
}

#status{
  font-size:13px;
  opacity:.72;
  position:relative;
  z-index:2;
}

/* SPOON PANEL */
#spoon{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 12px;
  font-size:13px;
  position:relative;
  z-index:2;
}

#spoon div{
  opacity:.88;
}

#spoon span{
  font-weight:600;
  color:#c6c7f8;
}

/* FOOTER TAG */
#footer{
  font-size:12px;
  opacity:.62;
  letter-spacing:.5px;
  position:relative;
  z-index:2;
}

/* LITTLE TWINKLE DUST */
.twinkle{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:.18;
  background:
    radial-gradient(circle at 12% 22%, rgba(255,255,255,.85) 0 1px, transparent 2px),
    radial-gradient(circle at 83% 18%, rgba(255,255,255,.70) 0 1px, transparent 2px),
    radial-gradient(circle at 74% 72%, rgba(198,199,248,.65) 0 1px, transparent 2px),
    radial-gradient(circle at 28% 78%, rgba(203,236,245,.7) 0 1px, transparent 2px),
    radial-gradient(circle at 56% 30%, rgba(255,255,255,.45) 0 1px, transparent 2px);
  animation:twinkle 9s ease-in-out infinite;
}

@keyframes twinkle{
  0%,100%{ opacity:.14; }
  50%{ opacity:.28; }
}
</style>
</head>
<body>

<div id="arena">
  <div class="overlay">

    <div class="panel">
      <div class="twinkle"></div>
      <div id="title">Moonbeam Arena</div>
      <div id="mainText">Entering the Moonbeam Arena</div>
      <div id="subText">The story unfolds…</div>
    </div>

    <div class="panel" id="scoreBox">
      <div class="twinkle"></div>

      <div class="scoreRow">
        <div class="team left" id="teamA">MIN</div>
        <div id="score">—</div>
        <div class="team right" id="teamB">OPP</div>
      </div>

      <div id="status">Loading</div>
    </div>

    <div class="panel">
      <div class="twinkle"></div>
      <div id="spoon">
        <div>Energy: <span id="energy">—</span></div>
        <div>Focus: <span id="focus">—</span></div>
        <div>Pain: <span id="pain">—</span></div>
        <div>Hydration: <span id="hydration">—</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="twinkle"></div>
      <div id="footer">Audio: Solomonster-approved</div>
    </div>

  </div>
</div>

<script>
// 🌙 MODE SWITCH
let mode = "wolves";
// "aew" | "wolves" | "lynx" | "vikings"

// =========================
// THE SPORTS DB SETTINGS
// =========================
const API_KEY = "123";
const BASE = `https://www.thesportsdb.com/api/v1/json/${API_KEY}`;
const REFRESH_MS = 15 * 60 * 1000;

const TEAM_CONFIG = {
  wolves: {
    name: "Minnesota Timberwolves",
    short: "Wolves",
    label: "Wolves Watch Mode"
  },
  lynx: {
    name: "Minnesota Lynx",
    short: "Lynx",
    label: "Lynx Watch Mode"
  },
  vikings: {
    name: "Minnesota Vikings",
    short: "Vikings",
    label: "Skol Mode Engaged"
  }
};

const teamCache = {
  wolves: { id: null },
  lynx: { id: null },
  vikings: { id: null }
};

let lastSportsRefresh = 0;
let lastMode = mode;

// =========================
// TEXT ROTATIONS
// =========================
const aewLines = [
  "Entering the Moonbeam Arena",
  "The drama is unfolding",
  "This was not in the script",
  "The timeline has shifted",
  "Main event energy building"
];

const aewSubs = [
  "Emotionally invested",
  "Judgment pending",
  "We remember the birthday blessing",
  "Audio aligned with the cosmos",
  "Post-show discourse inevitable"
];

const sportsFallbackLines = [
  "Holding Faith in Minnesota",
  "The North remembers",
  "We believe (again)",
  "Game time focus engaged"
];

const spoonStates = [
  { energy: "Game-locked", focus: "100%", pain: "Existing", hydration: "Drink water pls" },
  { energy: "Low but loyal", focus: "Locked in", pain: "Managed", hydration: "Check" },
  { energy: "Sustained", focus: "Hyperfixated", pain: "Background", hydration: "...maybe" }
];

// =========================
// HELPERS
// =========================
function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text ?? "";
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shortTeam(name) {
  if (!name) return "";
  return name
    .replace("Minnesota Timberwolves", "Wolves")
    .replace("Minnesota Vikings", "Vikings")
    .replace("Minnesota Lynx", "Lynx");
}

function safeScore(a, b) {
  const hasA = a !== null && a !== undefined && a !== "";
  const hasB = b !== null && b !== undefined && b !== "";
  return hasA && hasB ? `${a} - ${b}` : "—";
}

function formatDate(dateStr, timeStr) {
  if (!dateStr) return "Date TBD";

  const combined = timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T12:00:00`;
  const d = new Date(combined);

  if (Number.isNaN(d.getTime())) return dateStr;

  return d.toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function showScoreBox(show = true) {
  const scoreBox = document.getElementById("scoreBox");
  if (scoreBox) scoreBox.style.opacity = show ? 1 : 0;
}

// =========================
// SPOONIE STATUS
// =========================
function updateSpoons() {
  const s = random(spoonStates);
  setText("energy", s.energy);
  setText("focus", s.focus);
  setText("pain", s.pain);
  setText("hydration", s.hydration);
}

// =========================
// AEW MODE
// =========================
function renderAEWMode() {
  showScoreBox(false);
  setText("mainText", random(aewLines));
  setText("subText", random(aewSubs));
}

// =========================
// SPORTS API
// =========================
async function getJSON(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function getTeamInfo(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  const cache = teamCache[modeKey];

  if (!config) throw new Error(`Unknown mode: ${modeKey}`);
  if (cache.id) return cache.id;

  const url = `${BASE}/searchteams.php?t=${encodeURIComponent(config.name)}`;
  const data = await getJSON(url);

  if (!data?.teams?.length) {
    throw new Error(`Team not found: ${config.name}`);
  }

  cache.id = data.teams[0].idTeam;
  return cache.id;
}

async function getNextEvent(teamId) {
  const url = `${BASE}/eventsnext.php?id=${teamId}`;
  const data = await getJSON(url);
  return data?.events?.[0] || null;
}

async function getLastEvent(teamId) {
  const url = `${BASE}/eventslast.php?id=${teamId}`;
  const data = await getJSON(url);
  return data?.results?.[0] || data?.events?.[0] || null;
}

// =========================
// SPORTS RENDER
// =========================
function renderSportsLoading(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  showScoreBox(true);

  setText("mainText", config?.label || "Minnesota Watch Mode");
  setText("subText", "Gathering game threads...");
  setText("teamA", config?.short || "MIN");
  setText("teamB", "OPP");
  setText("score", "—");
  setText("status", "Loading");
}

function renderSportsError(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  showScoreBox(true);

  setText("mainText", random(sportsFallbackLines));
  setText("subText", "Signal from the arena is faint");
  setText("teamA", config?.short || "MIN");
  setText("teamB", "—");
  setText("score", "—");
  setText("status", "Unavailable");
}

function renderUpcoming(modeKey, ev) {
  const config = TEAM_CONFIG[modeKey];
  const home = ev?.strHomeTeam || "Home";
  const away = ev?.strAwayTeam || "Away";
  const isMinnHome = home === config.name;
  const opp = isMinnHome ? away : home;

  showScoreBox(true);

  setText("mainText", config.label);
  setText("subText", `Next up: vs ${shortTeam(opp)}`);
  setText("teamA", config.short);
  setText("teamB", shortTeam(opp));
  setText("score", "—");
  setText("status", formatDate(ev?.dateEvent, ev?.strTime));
}

function renderRecent(modeKey, ev) {
  const config = TEAM_CONFIG[modeKey];
  const home = ev?.strHomeTeam || "Home";
  const away = ev?.strAwayTeam || "Away";
  const homeScore = ev?.intHomeScore;
  const awayScore = ev?.intAwayScore;

  const isMinnHome = home === config.name;
  const opp = isMinnHome ? away : home;
  const minScore = isMinnHome ? homeScore : awayScore;
  const oppScore = isMinnHome ? awayScore : homeScore;

  showScoreBox(true);

  setText("mainText", config.label);
  setText("subText", `Most recent: vs ${shortTeam(opp)}`);
  setText("teamA", config.short);
  setText("teamB", shortTeam(opp));
  setText("score", safeScore(minScore, oppScore));
  setText("status", ev?.strStatus || ev?.dateEvent || "Final");
}

async function refreshSportsCard(modeKey, force = false) {
  const now = Date.now();

  if (!force && (now - lastSportsRefresh < REFRESH_MS)) return;
  lastSportsRefresh = now;

  try {
    renderSportsLoading(modeKey);

    const teamId = await getTeamInfo(modeKey);
    const nextEvent = await getNextEvent(teamId);

    if (nextEvent) {
      renderUpcoming(modeKey, nextEvent);
      return;
    }

    const lastEvent = await getLastEvent(teamId);

    if (lastEvent) {
      renderRecent(modeKey, lastEvent);
      return;
    }

    const config = TEAM_CONFIG[modeKey];
    setText("mainText", config.label);
    setText("subText", "No game data found");
    setText("teamA", config.short);
    setText("teamB", "—");
    setText("score", "—");
    setText("status", "Idle");
  } catch (err) {
    console.error(`sports overlay error (${modeKey}):`, err);
    renderSportsError(modeKey);
  }
}

// =========================
// MODE APPLY
// =========================
function setMode() {
  if (mode !== lastMode) {
    lastMode = mode;
    lastSportsRefresh = 0;
  }

  if (mode === "aew") {
    renderAEWMode();
    return;
  }

  if (mode === "wolves" || mode === "lynx" || mode === "vikings") {
    refreshSportsCard(mode);
    return;
  }

  renderAEWMode();
}

// =========================
// LOOP
// =========================
function loop() {
  setMode();
  updateSpoons();
}

loop();
setInterval(loop, 8000);
</script>

</body>
</html>
