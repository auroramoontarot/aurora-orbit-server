<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luna-Tics Shuttle Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Quicksand', sans-serif;
    }

    :root{
      --lav:#7f87ff;
      --teal:#00a9ba;
      --ice:#cbecf5;
      --mist:#c6c7f8;
      --bubble:rgba(12,18,38,.16);
      --bubble-strong:rgba(16,22,46,.24);
      --line:rgba(203,236,245,.12);
      --line-strong:rgba(127,135,255,.24);
    }

    .chat-wrap{
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 26px;
      background:
        radial-gradient(circle at center, rgba(10,14,30,0.04), rgba(10,14,30,0.08));
      border: 1px solid rgba(203,236,245,0.12);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.05),
        inset 0 0 30px rgba(0,169,186,0.06);
      backdrop-filter: blur(6px);
    }

    .chat-wrap::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at center, rgba(7,10,24,0.02) 0%, rgba(7,10,24,0.08) 70%, rgba(7,10,24,0.14) 100%);
      z-index:0;
    }

    .chat-wrap.speaking{
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.06),
        inset 0 0 34px rgba(0,169,186,0.10),
        0 0 18px rgba(127,135,255,0.18),
        0 0 28px rgba(0,169,186,0.12);
      border-color: rgba(203,236,245,0.18);
    }

    .chat-wrap.speaking::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:26px;
      background:
        radial-gradient(circle at center, rgba(127,135,255,0.08), transparent 60%),
        radial-gradient(circle at top right, rgba(0,169,186,0.08), transparent 45%);
      animation: astreaGlowPulse 1.8s ease-in-out infinite;
      z-index:1;
    }

    .chat-title{
      position:absolute;
      top:10px;
      left:16px;
      z-index:3;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      color:rgba(198,199,248,.84);
      text-shadow:
        0 0 8px rgba(127,135,255,.28),
        0 0 14px rgba(0,169,186,.16);
    }

    .chat-title .dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--teal);
      box-shadow:
        0 0 8px rgba(0,169,186,.7),
        0 0 14px rgba(0,169,186,.35);
      animation: pulseDot 2.2s ease-in-out infinite;
    }

    .chat-feed{
      position:absolute;
      left:14px;
      right:14px;
      top:38px;
      bottom:14px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      gap:8px;
      overflow:hidden;
      z-index:2;
    }

    .msg{
      position:relative;
      align-self:flex-start;
      max-width:84%;
      padding:10px 12px 10px 14px;
      border-radius:16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--bubble);
      border:1px solid var(--line);
      backdrop-filter: blur(4px);
      color:var(--ice);
      font-size:15px;
      line-height:1.35;
      word-break:break-word;
      box-shadow:
        0 0 10px rgba(127,135,255,.07),
        0 0 18px rgba(0,169,186,.04),
        inset 0 0 12px rgba(255,255,255,.015);
      opacity:0;
      transform:translateY(14px) scale(.98);
      animation:chatIn .45s ease forwards;
    }

    .msg::before{
      content:"";
      position:absolute;
      left:0;
      top:10px;
      bottom:10px;
      width:3px;
      border-radius:99px;
      background:linear-gradient(180deg, var(--lav), var(--teal));
      opacity:.75;
      box-shadow:0 0 10px rgba(127,135,255,.35);
    }

    .meta{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:3px;
      font-size:11px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      color:rgba(198,199,248,.68);
    }

    .tag{
      padding:2px 7px;
      border-radius:999px;
      border:1px solid rgba(203,236,245,.12);
      background:rgba(255,255,255,.035);
      color:rgba(198,199,248,.76);
      font-weight:700;
      letter-spacing:1px;
      font-size:10px;
    }

    .user{
      font-weight:700;
      color:var(--lav);
      text-shadow:0 0 8px rgba(127,135,255,.28);
    }

    .text{
      color:var(--ice);
      font-size:15px;
    }

    .msg.mod .user{
      color:var(--teal);
      text-shadow:0 0 8px rgba(0,169,186,.34);
    }

    .msg.owner{
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        var(--bubble-strong);
      border-color:var(--line-strong);
    }

    .msg.owner .user{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(127,135,255,.35),
        0 0 14px rgba(0,169,186,.25);
    }

    .msg.old{
      opacity:.55 !important;
      transform:none !important;
    }

    .empty-state{
      align-self:center;
      margin-top:auto;
      margin-bottom:auto;
      padding:10px 14px;
      border-radius:14px;
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:rgba(198,199,248,.62);
      background:rgba(10,14,30,.10);
      border:1px solid rgba(203,236,245,.08);
      backdrop-filter: blur(3px);
    }

    .error-state{
      color:#fff;
      border-color:rgba(255,120,120,.3);
      background:rgba(80,20,30,.25);
    }

    @keyframes chatIn{
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    @keyframes pulseDot{
      0%,100%{
        transform:scale(1);
        opacity:.9;
      }
      50%{
        transform:scale(1.2);
        opacity:1;
      }
    }

    @keyframes astreaGlowPulse{
      0%,100%{
        opacity:.45;
      }
      50%{
        opacity:.9;
      }
    }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-title">
      <span class="dot"></span>
      <span>Moonbeam Transmission</span>
    </div>

    <div class="chat-feed" id="chatFeed">
      <div class="empty-state" id="emptyState">Awaiting signal...</div>
    </div>
  </div>

  <audio id="astreaChime" src="/widgets/sounds/moonbeam.mp3" preload="auto"></audio>

  <script>
    const MAX_MESSAGES = 10;
    const feed = document.getElementById("chatFeed");
    const chatWrap = document.querySelector(".chat-wrap");
    let currentAudio = null;
    let speakingTimeout = null;

    function setSpeakingState(isSpeaking) {
      if (!chatWrap) return;

      if (isSpeaking) {
        chatWrap.classList.add("speaking");

        if (speakingTimeout) {
          clearTimeout(speakingTimeout);
          speakingTimeout = null;
        }
      } else {
        speakingTimeout = setTimeout(() => {
          chatWrap.classList.remove("speaking");
        }, 250);
      }
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getTimeStamp(){
      const now = new Date();
      return now.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function refreshAges(){
      const messages = [...feed.querySelectorAll(".msg")];
      messages.forEach((el, index) => {
        el.classList.remove("old");
        if (index < messages.length - 3) el.classList.add("old");
      });
    }

    function removeOldestIfNeeded(){
      while (feed.querySelectorAll(".msg").length > MAX_MESSAGES) {
        const firstMsg = feed.querySelector(".msg");
        if (firstMsg) firstMsg.remove();
      }
    }

    function buildRoleTag(data){
      if (data.broadcaster) return "Host";
      if (data.mod) return "Mod";
      if (data.subscriber) return "Moonbeam";
      return "Signal";
    }

    function addMessage(data){
      const currentEmpty = document.getElementById("emptyState");
      if (currentEmpty) currentEmpty.remove();

      const msg = document.createElement("div");
      msg.className = "msg";

      if (data.broadcaster) {
        msg.classList.add("owner");
      } else if (data.mod) {
        msg.classList.add("mod");
      }

      msg.innerHTML = `
        <div class="meta">
          <span class="tag">${buildRoleTag(data)}</span>
          <span>${getTimeStamp()}</span>
        </div>
        <div class="content">
          <span class="user">${escapeHtml(data.user)}:</span>
          <span class="text">${escapeHtml(data.text)}</span>
        </div>
      `;

      feed.appendChild(msg);
      removeOldestIfNeeded();
      refreshAges();
    }

    async function playTTS(text, mode = "astrea"){
      try {
        const res = await fetch("/tts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, mode })
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(err || `HTTP ${res.status}`);
        }

        const blob = await res.blob();

        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const chime = document.getElementById("astreaChime");

        if (mode === "astrea") {
          setSpeakingState(true);
        }

        if (chime && mode === "astrea") {
          chime.volume = 0.3;
          chime.currentTime = 0;
          await chime.play();
        }

        await new Promise(r => setTimeout(r, mode === "astrea" ? 500 : 120));

        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;
        audio.volume = 0.8;

        audio.onended = () => {
          URL.revokeObjectURL(url);
          if (mode === "astrea") {
            setSpeakingState(false);
          }
        };

        await audio.play();

      } catch (err) {
        if (mode === "astrea") {
          setSpeakingState(false);
        }
        console.error("TTS play failed:", err);
      }
    }

    const stream = new EventSource("/chatstream");

    stream.onopen = () => {
      const currentEmpty = document.getElementById("emptyState");
      if (currentEmpty) currentEmpty.textContent = "Signal locked in...";
    };

    stream.onmessage = async (event) => {
      try {
        const data = JSON.parse(event.data);

        if (data.type === "status") {
          const currentEmpty = document.getElementById("emptyState");
          if (currentEmpty) currentEmpty.textContent = "Signal locked in...";
          return;
        }

        if (data.type === "message") {
          addMessage(data);
          return;
        }

        if (data.type === "tts") {
          await playTTS(data.text, data.mode || "astrea");
          return;
        }

        if (data.type === "astrea") {
          await playTTS(data.text, "astrea");
          return;
        }

        if (data.type === "aurora") {
          await playTTS(data.text, "aurora");
          return;
        }

      } catch (err) {
        console.error("Bad chatstream payload:", err);
      }
    };

    stream.onerror = () => {
      const currentEmpty = document.getElementById("emptyState");
      if (currentEmpty) {
        currentEmpty.textContent = "Relay offline...";
        currentEmpty.classList.add("error-state");
      }
    };
  </script>
</body>
</html>
