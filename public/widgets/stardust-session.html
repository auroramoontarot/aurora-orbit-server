<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<title>Aurora Moon Pomodoro</title>

<style>
:root{
  --text:#cbecf5;
  --soft:#c6c7f8;
  --aurora:#00a9ba;
  --primary:#7f87ff;
  --deep:#2b2772;
  --line:rgba(203,236,245,.22);
}

*{ box-sizing:border-box; }

html, body {
  margin: 0;
  width:100%;
  height:100%;
  background: transparent;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: var(--text);
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  width: min(720px, calc(100vw - 80px));
  min-height: 320px;
  transform: translate(-50%, -50%);
  text-align: center;

  padding: 38px 42px 32px;
  border-radius: 38px;

  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)),
    radial-gradient(circle at top left, rgba(203,236,245,.22), transparent 40%),
    radial-gradient(circle at bottom right, rgba(127,135,255,.26), transparent 45%),
    rgba(12,16,35,.72);

  border: 1px solid var(--line);
  box-shadow:
    0 0 35px rgba(0,169,186,.26),
    0 0 80px rgba(127,135,255,.16),
    inset 0 0 28px rgba(255,255,255,.08);

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  overflow:hidden;
}

.container::after{
  content:"✦";
  position:absolute;
  top:22px;
  right:28px;
  font-size:24px;
  color:var(--soft);
  opacity:.62;
  text-shadow:0 0 16px var(--aurora);
  animation: twinkle 3.5s ease-in-out infinite;
}

.timer {
  position:relative;
  z-index:1;
  font-size: 112px;
  font-weight: 700;
  line-height:1;
  margin-bottom: 13px;
  letter-spacing: 2px;
  color: #f2fcff;
  text-shadow:
    0 0 12px rgba(203,236,245,.82),
    0 0 28px rgba(0,169,186,.72),
    0 0 54px rgba(127,135,255,.45);
}

.status {
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width: 330px;

  font-size: 44px;
  margin-top: 13px;
  padding: 12px 24px;
  letter-spacing: 1px;
  opacity: 0.96;
  font-weight: 700;

  border-radius:999px;
  background:rgba(43,39,114,.34);
  border:1px solid rgba(203,236,245,.22);
  box-shadow:
    inset 0 0 14px rgba(255,255,255,.08),
    0 0 20px rgba(0,169,186,.18);
}

.moon-note{
  position:relative;
  z-index:1;
  margin-top:20px;
  font-size:25px;
  color:rgba(203,236,245,.82);
  letter-spacing:.6px;
}

@keyframes twinkle{
  0%,100%{ opacity:.35; transform:scale(.92) rotate(0deg); }
  50%{ opacity:.9; transform:scale(1.12) rotate(12deg); }
}
</style>
</head>

<body>

<div class="container">
  <div class="timer" id="timer">--:--</div>
  <div class="status" id="status">Sip☕</div>
  <div class="moon-note">scatter stardust • sip gently • return softly</div>
</div>

<audio id="focusMusic" autoplay loop>
  <source src="sounds/focus-music.mp3" type="audio/mpeg">
</audio>

<audio id="chime">
  <source src="sounds/moonbeam.mp3" type="audio/mpeg">
</audio>

<script>

const timerDisplay = document.getElementById("timer");
const statusDisplay = document.getElementById("status");
const focusMusic = document.getElementById("focusMusic");
const chime = document.getElementById("chime");

focusMusic.volume = 0.13;

/* ---------- AUDIO SAFETY ---------- */

function safePlay(audio) {
  audio.play().catch(() => {
    console.log("Audio blocked until user interaction");
  });
}

function unlockAudio() {
  focusMusic.play().then(() => {
    focusMusic.pause();
    focusMusic.currentTime = 0;
  }).catch(() => {});
}

window.addEventListener("click", unlockAudio, { once: true });
window.addEventListener("keydown", unlockAudio, { once: true });

let lastPhase = null;

/* ---------- REAL-TIME SYNC ---------- */

function getSessionState(){
  const now = new Date();
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();

  let phase, remaining;

  if (minutes < 25) {
    phase = "FOCUS";
    remaining = (24 - minutes) * 60 + (60 - seconds);
  } 
  else if (minutes < 30) {
    phase = "BREAK";
    remaining = (29 - minutes) * 60 + (60 - seconds);
  } 
  else if (minutes < 55) {
    phase = "FOCUS";
    remaining = (54 - minutes) * 60 + (60 - seconds);
  } 
  else {
    phase = "BREAK";
    remaining = (59 - minutes) * 60 + (60 - seconds);
  }

  return { phase, remaining };
}

function startAutoPomodoro(){
  function update(){
    const { phase, remaining } = getSessionState();

    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;

    timerDisplay.textContent =
      `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

    statusDisplay.textContent =
      phase === "FOCUS" ? "✨ Focus Session" : "☕ Stardust Break";

    /* 🔔 trigger only when phase changes */
    if (phase !== lastPhase) {
      lastPhase = phase;

      chime.currentTime = 0;
      safePlay(chime);

      if (phase === "BREAK") {
        fetch("http://localhost:3000/coffee-break", { method: "POST" })
          .catch(err => console.error("Coffee break trigger failed:", err));
      } else {
        fetch("http://localhost:3000/focus-start", { method: "POST" })
          .catch(err => console.error("Focus start trigger failed:", err));
      }
    }
  }

  update();
  setInterval(update, 1000);
}
/* ---------- INIT ---------- */

safePlay(focusMusic);
startAutoPomodoro();
</script>

</body>
</html>
