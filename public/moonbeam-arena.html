<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonbeam Arena</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  font-family:'Quicksand', sans-serif;
  color:#cbecf5;
}

#arena{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* SOFT AURORA / ATMOSPHERE */
#arena::before{
  content:"";
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at 20% 20%, rgba(127,135,255,.14), transparent 35%),
    radial-gradient(circle at 75% 25%, rgba(0,169,186,.12), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(198,199,248,.08), transparent 45%);
  filter:blur(60px);
  animation:auroraFloat 18s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:0;
}

@keyframes auroraFloat{
  from{ transform:translateX(-2%) translateY(0); }
  to{ transform:translateX(2%) translateY(-1%); }
}

/* MAIN PANEL */
.overlay{
  position:absolute;
  left:20px;
  top:20px;
  width:420px;
  max-width:calc(100vw - 40px);
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:2;
  max-height:calc(100vh - 40px);
  overflow:hidden;
  padding:4px 10px 8px 2px;
  box-sizing:border-box;
  filter:
    drop-shadow(0 0 12px rgba(127,135,255,.18))
    drop-shadow(0 0 20px rgba(0,169,186,.10));
}

/* GLASS PANEL SYSTEM */
.panel{
  position:relative;
  background:rgba(18,22,40,.34);
  border:1px solid rgba(203,236,245,.12);
  border-radius:14px;
  padding:10px 14px;
  backdrop-filter:blur(14px) saturate(1.15);
  -webkit-backdrop-filter:blur(14px) saturate(1.15);
  box-shadow:
    0 8px 24px rgba(0,0,0,.22),
    0 0 12px rgba(127,135,255,.10),
    inset 0 1px 0 rgba(255,255,255,.06);
  overflow:hidden;
  isolation:isolate;
}

.panel::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,.10),
      rgba(255,255,255,.025) 28%,
      transparent 60%
    );
  pointer-events:none;
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  background:
    linear-gradient(
      90deg,
      rgba(0,169,186,.14) 0%,
      transparent 18%,
      transparent 82%,
      rgba(127,135,255,.16) 100%
    );
  opacity:.75;
  pointer-events:none;
}

/* HEADER */
#title{
  font-size:13px;
  letter-spacing:2.2px;
  text-transform:uppercase;
  opacity:.86;
  margin-bottom:6px;
  position:relative;
  z-index:2;
  color:#c6c7f8;
  text-shadow:0 0 10px rgba(127,135,255,.18);
}

#mainText{
  font-size:32px;
  font-weight:700;
  line-height:1.08;
  text-shadow:
    0 0 10px rgba(0,169,186,.20),
    0 0 22px rgba(127,135,255,.14);
  position:relative;
  z-index:2;
}

#subText{
  margin-top:6px;
  font-size:15px;
  opacity:.84;
  position:relative;
  z-index:2;
}

/* SCORE BOX */
#scoreBox{
  display:flex;
  flex-direction:column;
  gap:6px;
  opacity:0;
  transition:opacity .35s ease;
}

#scoreBox::before{
  content:"";
  position:absolute;
  left:10px;
  right:10px;
  top:0;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg, #00a9ba, #7f87ff, #cbecf5);
  opacity:.65;
  z-index:2;
}

.scoreRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
  position:relative;
  z-index:2;
}

.teamWrap{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.teamWrap.left{
  justify-content:flex-start;
}

.teamWrap.right{
  justify-content:flex-end;
}

.team{
  font-size:18px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.team.left{
  text-align:left;
}

.team.right{
  text-align:right;
}

.teamLogo{
  width:26px;
  height:26px;
  object-fit:contain;
  flex:0 0 26px;
  filter:
    drop-shadow(0 0 6px rgba(255,255,255,.12))
    drop-shadow(0 0 14px rgba(0,169,186,.20))
    drop-shadow(0 0 20px rgba(127,135,255,.14));
  opacity:.95;
}

#score{
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
  text-shadow:
    0 0 10px rgba(127,135,255,.24),
    0 0 18px rgba(0,169,186,.16);
  min-width:72px;
  text-align:center;
}

#status{
  font-size:12px;
  opacity:.72;
  text-transform:uppercase;
  letter-spacing:1.2px;
  position:relative;
  z-index:2;
}

/* SPOON PANEL */
#spoon{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 12px;
  font-size:13px;
  position:relative;
  z-index:2;
}

#spoon div{
  opacity:.88;
}

#spoon span{
  font-weight:600;
  color:#c6c7f8;
}

/* FOOTER TAG */
#footer{
  font-size:12px;
  opacity:.62;
  letter-spacing:.5px;
  position:relative;
  z-index:2;
}

/* LITTLE TWINKLE DUST */
.twinkle{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:.10;
  background:
    radial-gradient(circle at 12% 22%, rgba(255,255,255,.55) 0 1px, transparent 2px),
    radial-gradient(circle at 83% 18%, rgba(255,255,255,.35) 0 1px, transparent 2px),
    radial-gradient(circle at 74% 72%, rgba(198,199,248,.30) 0 1px, transparent 2px),
    radial-gradient(circle at 28% 78%, rgba(203,236,245,.32) 0 1px, transparent 2px),
    radial-gradient(circle at 56% 30%, rgba(255,255,255,.22) 0 1px, transparent 2px);
  animation:twinkle 9s ease-in-out infinite;
}

@keyframes twinkle{
  0%,100%{ opacity:.08; }
  50%{ opacity:.14; }
}

/* =========================
   TEAM THEMES
========================= */

#logoA{
  transform:scale(1.08);
}

/* 🐺 WOLVES */
#arena.theme-wolves .panel{
  box-shadow:
    0 8px 24px rgba(0,0,0,.22),
    0 0 12px rgba(127,135,255,.10),
    0 0 24px rgba(0,169,186,.10),
    inset 0 1px 0 rgba(255,255,255,.06);
}

#arena.theme-wolves #logoA{
  filter:
    drop-shadow(0 0 8px rgba(0,169,186,.28))
    drop-shadow(0 0 16px rgba(127,135,255,.18));
}

/* 🐆 LYNX */
#arena.theme-lynx .panel{
  box-shadow:
    0 8px 24px rgba(0,0,0,.22),
    0 0 12px rgba(203,236,245,.12),
    0 0 24px rgba(0,169,186,.10),
    inset 0 1px 0 rgba(255,255,255,.06);
}

#arena.theme-lynx #logoA{
  filter:
    drop-shadow(0 0 8px rgba(203,236,245,.28))
    drop-shadow(0 0 16px rgba(0,169,186,.18));
}

#arena.theme-lynx #scoreBox::before{
  background:linear-gradient(90deg, #cbecf5, #00a9ba, #7f87ff);
  opacity:.85;
}

/* 🟣 VIKINGS (THE IMPORTANT ONE 😄) */
#arena.theme-vikings .panel{
  box-shadow:
    0 8px 24px rgba(0,0,0,.24),
    0 0 14px rgba(140,92,255,.22),
    0 0 28px rgba(97,55,201,.20),
    inset 0 1px 0 rgba(255,255,255,.06);
}

#arena.theme-vikings #logoA{
  filter:
    drop-shadow(0 0 12px rgba(167,120,255,.55))
    drop-shadow(0 0 22px rgba(110,63,214,.40));
}

#arena.theme-vikings #scoreBox::before{
  background:linear-gradient(90deg, #8c5cff, #6a3df0, #c6a8ff);
  opacity:.95;
}

/* SCORE PULSE */
#score{
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
  text-shadow:
    0 0 10px rgba(127,135,255,.24),
    0 0 18px rgba(0,169,186,.16);
  min-width:72px;
  text-align:center;
  transition:transform .25s ease, filter .25s ease, text-shadow .25s ease;
}

#score.score-pulse{
  animation:scorePulse .7s cubic-bezier(.2,.8,.2,1);
}

@keyframes scorePulse{
  0%{
    transform:scale(1);
    filter:brightness(1);
  }
  30%{
    transform:scale(1.16);
    filter:brightness(1.25);
  }
  100%{
    transform:scale(1);
    filter:brightness(1);
  }
}

/* TEAM-SPECIFIC SCORE GLOW */
#arena.theme-wolves #score.score-pulse{
  text-shadow:
    0 0 10px rgba(127,135,255,.35),
    0 0 20px rgba(0,169,186,.28),
    0 0 30px rgba(203,236,245,.12);
}

#arena.theme-lynx #score.score-pulse{
  text-shadow:
    0 0 10px rgba(203,236,245,.35),
    0 0 18px rgba(0,169,186,.24),
    0 0 28px rgba(127,135,255,.14);
}

#arena.theme-vikings #score.score-pulse{
  text-shadow:
    0 0 10px rgba(198,168,255,.45),
    0 0 20px rgba(140,92,255,.40),
    0 0 32px rgba(106,61,240,.24);
}

/* =========================
   WINNING STATE BOOST
========================= */

#arena.team-winning .panel{
  box-shadow:
    0 10px 28px rgba(0,0,0,.28),
    0 0 18px rgba(127,135,255,.20),
    0 0 34px rgba(0,169,186,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
}

#arena.theme-wolves.team-winning .panel{
  box-shadow:
    0 10px 28px rgba(0,0,0,.28),
    0 0 18px rgba(127,135,255,.22),
    0 0 40px rgba(0,169,186,.28),
    inset 0 1px 0 rgba(255,255,255,.08);
}

#arena.theme-lynx.team-winning .panel{
  box-shadow:
    0 10px 28px rgba(0,0,0,.28),
    0 0 18px rgba(203,236,245,.22),
    0 0 36px rgba(0,169,186,.22),
    inset 0 1px 0 rgba(255,255,255,.08);
}

#arena.theme-vikings.team-winning .panel{
  box-shadow:
    0 10px 28px rgba(0,0,0,.30),
    0 0 22px rgba(140,92,255,.32),
    0 0 44px rgba(106,61,240,.34),
    inset 0 1px 0 rgba(255,255,255,.08);
}
</style>
</head>
<body>

<div id="arena">
  <div class="overlay">

    <div class="panel">
      <div class="twinkle"></div>
      <div id="title">Moonbeam Arena</div>
      <div id="mainText">Entering the Moonbeam Arena</div>
      <div id="subText">The story unfolds…</div>
    </div>

<div class="panel" id="scoreBox">
  <div class="twinkle"></div>

  <div class="scoreRow">
    <div class="teamWrap left">
      <img id="logoA" class="teamLogo" src="images/nba/timberwolves.png" alt="Team A logo">
      <div class="team left" id="teamA">MIN</div>
    </div>

    <div id="score">—</div>

    <div class="teamWrap right">
      <div class="team right" id="teamB">OPP</div>
      <img id="logoB" class="teamLogo" src="images/nba/nba.png" alt="Team B logo">
    </div>
  </div>

  <div id="status">Loading</div>
</div>

    <div class="panel">
      <div class="twinkle"></div>
      <div id="spoon">
        <div>Energy: <span id="energy">—</span></div>
        <div>Focus: <span id="focus">—</span></div>
        <div>Pain: <span id="pain">—</span></div>
        <div>Hydration: <span id="hydration">—</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="twinkle"></div>
      <div id="footer">Audio: Solomonster-approved</div>
    </div>

  </div>
</div>

<script>
// 🌙 MODE SWITCH
let mode = "wolves";

// "aew" | "wolves" | "lynx" | "vikings"

// =========================
// THE SPORTS DB SETTINGS
// =========================
const API_KEY = "123";
const BASE = `https://www.thesportsdb.com/api/v1/json/${API_KEY}`;
const REFRESH_MS = 15 * 60 * 1000;

const TEAM_CONFIG = {
  wolves: {
    name: "Minnesota Timberwolves",
    short: "Wolves",
    label: "Wolves Watch Mode",
    league: "nba"
  },
  lynx: {
    name: "Minnesota Lynx",
    short: "Lynx",
    label: "Lynx Watch Mode",
    league: "wnba"
  },
  vikings: {
    name: "Minnesota Vikings",
    short: "Vikings",
    label: "Skol Mode Engaged",
    league: "nfl"
  }
};

const teamCache = {
  wolves: { id: null },
  lynx: { id: null },
  vikings: { id: null }
};

let lastSportsRefresh = 0;
let lastMode = mode;

let lastRenderedScore = "";
let lastRenderedMode = mode;

// =========================
// TEXT ROTATIONS
// =========================
const aewLines = [
  "Entering the Moonbeam Arena",
  "The drama is unfolding",
  "This was not in the script",
  "The timeline has shifted",
  "Main event energy building"
];

const aewSubs = [
  "Emotionally invested",
  "Judgment pending",
  "We remember the birthday blessing",
  "Audio aligned with the cosmos",
  "Post-show discourse inevitable"
];

const sportsFallbackLines = [
  "Holding Faith in Minnesota",
  "The North remembers",
  "We believe (again)",
  "Game time focus engaged"
];

const spoonStates = [
  { energy: "Game-locked", focus: "100%", pain: "Existing", hydration: "Drink water pls" },
  { energy: "Low but loyal", focus: "Locked in", pain: "Managed", hydration: "Check" },
  { energy: "Sustained", focus: "Hyperfixated", pain: "Background", hydration: "...maybe" }
];

const TEAM_LOGOS = {
  wolves: "images/nba/timberwolves.png",
  lynx: "images/wnba/lynx.png",
  vikings: "images/nfl/vikings.png"
};

// =========================
// HELPERS
// =========================
function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text ?? "";
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shortTeam(name) {
  if (!name) return "";
  return name
    .replace("Minnesota Timberwolves", "Wolves")
    .replace("Minnesota Vikings", "Vikings")
    .replace("Minnesota Lynx", "Lynx")
    .replace("Detroit Pistons", "Pistons")
    .replace("Los Angeles Lakers", "Lakers")
    .replace("Golden State Warriors", "Warriors")
    .replace("Denver Nuggets", "Nuggets")
    .replace("Oklahoma City Thunder", "Thunder")
    .replace("New York Liberty", "Liberty")
    .replace("Las Vegas Aces", "Aces")
    .replace("Seattle Storm", "Storm")
    .replace("Chicago Sky", "Sky")
    .replace("Green Bay Packers", "Packers")
    .replace("Detroit Lions", "Lions")
    .replace("Chicago Bears", "Bears");
}

function safeScore(a, b) {
  const hasA = a !== null && a !== undefined && a !== "";
  const hasB = b !== null && b !== undefined && b !== "";
  return hasA && hasB ? `${a} - ${b}` : "—";
}

function formatDate(dateStr, timeStr) {
  if (!dateStr) return "Date TBD";

  const combined = timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T12:00:00`;
  const d = new Date(combined);

  if (Number.isNaN(d.getTime())) return dateStr;

  return d.toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function showScoreBox(show = true) {
  const scoreBox = document.getElementById("scoreBox");
  if (scoreBox) scoreBox.style.opacity = show ? 1 : 0;
}

// =========================
// THEMES
// =========================
function applyTheme(modeKey) {
  const arena = document.getElementById("arena");
  if (!arena) return;

  arena.classList.remove("theme-wolves", "theme-lynx", "theme-vikings");

  if (modeKey === "wolves") arena.classList.add("theme-wolves");
  else if (modeKey === "lynx") arena.classList.add("theme-lynx");
  else if (modeKey === "vikings") arena.classList.add("theme-vikings");
}

function pulseScoreIfChanged(nextScore) {
  const scoreEl = document.getElementById("score");
  if (!scoreEl) return;

  const scoreText = nextScore ?? "—";

  if (lastRenderedMode !== mode) {
    lastRenderedMode = mode;
    lastRenderedScore = scoreText;
    return;
  }

  if (scoreText !== "—" && scoreText !== lastRenderedScore) {
    scoreEl.classList.remove("score-pulse");

    // restart animation cleanly
    void scoreEl.offsetWidth;

    scoreEl.classList.add("score-pulse");

    setTimeout(() => {
      scoreEl.classList.remove("score-pulse");
    }, 700);
  }

  lastRenderedScore = scoreText;
}

function applyWinningState(minScore, oppScore) {
  const arena = document.getElementById("arena");
  if (!arena) return;

  arena.classList.remove("team-winning");

  if (
    minScore !== null && oppScore !== null &&
    minScore !== undefined && oppScore !== undefined &&
    Number(minScore) > Number(oppScore)
  ) {
    arena.classList.add("team-winning");
  }
}

// =========================
// LOGO HELPERS
// =========================
function normalizeNBATeam(name = "") {
  return name.toLowerCase()
    .replace("atlanta", "")
    .replace("boston", "")
    .replace("brooklyn", "")
    .replace("charlotte", "")
    .replace("chicago", "")
    .replace("cleveland", "")
    .replace("dallas", "")
    .replace("denver", "")
    .replace("detroit", "")
    .replace("golden state", "")
    .replace("houston", "")
    .replace("indiana", "")
    .replace("los angeles", "")
    .replace("memphis", "")
    .replace("miami", "")
    .replace("milwaukee", "")
    .replace("minnesota", "")
    .replace("new orleans", "")
    .replace("new york", "")
    .replace("oklahoma city", "")
    .replace("orlando", "")
    .replace("philadelphia", "")
    .replace("phoenix", "")
    .replace("portland", "")
    .replace("sacramento", "")
    .replace("san antonio", "")
    .replace("toronto", "")
    .replace("utah", "")
    .replace("washington", "")
    .replace("trail blazers", "blazers")
    .replace("76ers", "sixers")
    .trim()
    .replace(/\s+/g, "");
}

function normalizeWNBATeam(name = "") {
  return name.toLowerCase()
    .replace("atlanta", "")
    .replace("chicago", "")
    .replace("connecticut", "")
    .replace("dallas", "")
    .replace("golden state", "")
    .replace("indiana", "")
    .replace("las vegas", "")
    .replace("los angeles", "")
    .replace("minnesota", "")
    .replace("new york", "")
    .replace("phoenix", "")
    .replace("seattle", "")
    .replace("washington", "")
    .trim()
    .replace(/\s+/g, "");
}

function normalizeNFLTeam(name = "") {
  return name.toLowerCase()
    .replace("arizona", "")
    .replace("atlanta", "")
    .replace("baltimore", "")
    .replace("buffalo", "")
    .replace("carolina", "")
    .replace("chicago", "")
    .replace("cincinnati", "")
    .replace("cleveland", "")
    .replace("dallas", "")
    .replace("denver", "")
    .replace("detroit", "")
    .replace("green bay", "")
    .replace("houston", "")
    .replace("indianapolis", "")
    .replace("jacksonville", "")
    .replace("kansas city", "")
    .replace("las vegas", "")
    .replace("los angeles", "")
    .replace("miami", "")
    .replace("minnesota", "")
    .replace("new england", "")
    .replace("new orleans", "")
    .replace("new york", "")
    .replace("philadelphia", "")
    .replace("pittsburgh", "")
    .replace("san francisco", "")
    .replace("seattle", "")
    .replace("tampa bay", "")
    .replace("tennessee", "")
    .replace("washington", "")
    .trim()
    .replace(/\s+/g, "");
}

function getOpponentLogo(modeKey, opponentName = "") {
  if (!opponentName) {
    if (modeKey === "wolves") return "images/nba/nba.png";
    if (modeKey === "lynx") return "images/wnba/wnba.png";
    if (modeKey === "vikings") return "images/nfl/nfl.png";
    return "images/default-team.png";
  }

  if (modeKey === "wolves") {
    return `images/nba/${normalizeNBATeam(opponentName)}.png`;
  }

  if (modeKey === "lynx") {
    return `images/wnba/${normalizeWNBATeam(opponentName)}.png`;
  }

  if (modeKey === "vikings") {
    return `images/nfl/${normalizeNFLTeam(opponentName)}.png`;
  }

  return "images/default-team.png";
}

function getFallbackLogo(modeKey) {
  if (modeKey === "wolves") return "images/nba/nba.png";
  if (modeKey === "lynx") return "images/wnba/wnba.png";
  if (modeKey === "vikings") return "images/nfl/nfl.png";
  return "images/default-team.png";
}

function setLogos(modeKey, opponentName = "") {
  const logoA = document.getElementById("logoA");
  const logoB = document.getElementById("logoB");

  if (logoA) {
    logoA.src = TEAM_LOGOS[modeKey] || "images/default-team.png";
    logoA.onerror = () => {
      logoA.src = "images/default-team.png";
    };
  }

  if (logoB) {
    const fallback = getFallbackLogo(modeKey);
    logoB.src = getOpponentLogo(modeKey, opponentName);
    logoB.onerror = () => {
      logoB.src = fallback;
    };
  }
}

// =========================
// SPOONIE STATUS
// =========================
function updateSpoons() {
  const s = random(spoonStates);
  setText("energy", s.energy);
  setText("focus", s.focus);
  setText("pain", s.pain);
  setText("hydration", s.hydration);
}

// =========================
// AEW MODE
// =========================
function renderAEWMode() {
  showScoreBox(false);
  setText("mainText", random(aewLines));
  setText("subText", random(aewSubs));
}

// =========================
// SPORTS API
// =========================
async function getJSON(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function getTeamInfo(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  const cache = teamCache[modeKey];

  if (!config) throw new Error(`Unknown mode: ${modeKey}`);
  if (cache.id) return cache.id;

  const url = `${BASE}/searchteams.php?t=${encodeURIComponent(config.name)}`;
  const data = await getJSON(url);

  if (!data?.teams?.length) {
    throw new Error(`Team not found: ${config.name}`);
  }

  cache.id = data.teams[0].idTeam;
  return cache.id;
}

async function getNextEvent(teamId) {
  const url = `${BASE}/eventsnext.php?id=${teamId}`;
  const data = await getJSON(url);
  return data?.events?.[0] || null;
}

async function getLastEvent(teamId) {
  const url = `${BASE}/eventslast.php?id=${teamId}`;
  const data = await getJSON(url);
  return data?.results?.[0] || data?.events?.[0] || null;
}

// =========================
// SPORTS RENDER
// =========================
function renderSportsLoading(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  showScoreBox(true);

  setText("mainText", config?.label || "Minnesota Watch Mode");
  setText("subText", "Gathering game threads...");
  setText("teamA", config?.short || "MIN");
  setText("teamB", "OPP");
  setText("score", "—");
  setText("status", "Loading");
  setLogos(modeKey, "");
}

function renderSportsError(modeKey) {
  const config = TEAM_CONFIG[modeKey];
  showScoreBox(true);

  setText("mainText", random(sportsFallbackLines));
  setText("subText", "Signal from the arena is faint");
  setText("teamA", config?.short || "MIN");
  setText("teamB", "—");
  setText("score", "—");
  setText("status", "Unavailable");
  setLogos(modeKey, "");
}

function renderUpcoming(modeKey, ev) {
  const config = TEAM_CONFIG[modeKey];
  const home = ev?.strHomeTeam || "Home";
  const away = ev?.strAwayTeam || "Away";
  const isMinnHome = home === config.name;
  const opp = isMinnHome ? away : home;

  showScoreBox(true);

  setText("mainText", config.label);
  setText("subText", `Next up: vs ${shortTeam(opp)}`);
  setText("teamA", config.short);
  setText("teamB", shortTeam(opp));
setText("score", "—");
lastRenderedScore = "—";
document.getElementById("arena")?.classList.remove("team-winning");
  setText("status", formatDate(ev?.dateEvent, ev?.strTime));
  setLogos(modeKey, opp);
}

function renderRecent(modeKey, ev) {
  const config = TEAM_CONFIG[modeKey];
  const home = ev?.strHomeTeam || "Home";
  const away = ev?.strAwayTeam || "Away";
  const homeScore = ev?.intHomeScore;
  const awayScore = ev?.intAwayScore;

  const isMinnHome = home === config.name;
  const opp = isMinnHome ? away : home;
  const minScore = isMinnHome ? homeScore : awayScore;
  const oppScore = isMinnHome ? awayScore : homeScore;

  showScoreBox(true);

  setText("mainText", config.label);
  setText("subText", `Most recent: vs ${shortTeam(opp)}`);
  setText("teamA", config.short);
  setText("teamB", shortTeam(opp));

const nextScore = safeScore(minScore, oppScore);
setText("score", nextScore);
pulseScoreIfChanged(nextScore);
applyWinningState(minScore, oppScore);

  setText("status", ev?.strStatus || ev?.dateEvent || "Final");
  setLogos(modeKey, opp);
}

async function refreshSportsCard(modeKey, force = false) {
  const now = Date.now();

  if (!force && (now - lastSportsRefresh < REFRESH_MS)) return;
  lastSportsRefresh = now;

  try {
    renderSportsLoading(modeKey);

    const teamId = await getTeamInfo(modeKey);
    const nextEvent = await getNextEvent(teamId);

    if (nextEvent) {
      renderUpcoming(modeKey, nextEvent);
      return;
    }

    const lastEvent = await getLastEvent(teamId);

    if (lastEvent) {
      renderRecent(modeKey, lastEvent);
      return;
    }

    const config = TEAM_CONFIG[modeKey];
    setText("mainText", config.label);
    setText("subText", "No game data found");
    setText("teamA", config.short);
    setText("teamB", "—");
    setText("score", "—");
    setText("status", "Idle");
    setLogos(modeKey, "");
  } catch (err) {
    console.error(`sports overlay error (${modeKey}):`, err);
    renderSportsError(modeKey);
  }
}

// =========================
// MODE APPLY
// =========================
function setMode() {
  if (mode !== lastMode) {
    lastMode = mode;
    lastSportsRefresh = 0;
  }

  applyTheme(mode);

  if (mode === "aew") {
    renderAEWMode();
    return;
  }

  if (mode === "wolves" || mode === "lynx" || mode === "vikings") {
    refreshSportsCard(mode);
    return;
  }

  renderAEWMode();
}

// =========================
// LOOP
// =========================
function loop() {
  setMode();
  updateSpoons();
}

loop();
setInterval(loop, 8000);
</script>
